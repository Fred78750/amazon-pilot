name: Deploy Amazon Pilot to S3 (Staging)

on:
  push:
    branches: [staging]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Deploy to S3 (Recette)
        run: |
          aws s3 cp amazon-pilot-latest.html s3://amazon-pilot-recette/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront (Recette)
        run: |
          aws cloudfront create-invalidation \
            --distribution-id EVQ30COFUNGA7 \
            --paths "/*"

      - name: Done
        run: echo "Deployed to Staging successfully"
