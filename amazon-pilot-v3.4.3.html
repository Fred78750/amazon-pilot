    </div>
    <div style="display:flex;gap:6px;flex-shrink:0">
      <button class="btn btn-sm" onclick="openAmazonProduct('${asin}','${mkt}')">Voir sur Amazon</button>
      <button class="btn btn-sm" onclick="copyBuyBoxChromePrompt('${asin}','${mkt}')">Prompt IA</button>
    </div>
  </div>`;

  // Onglets 2-3-4
  const tabs = [['plan','2 — Plan d\u2019action'],['suivi','3 — Suivi'],['bilan','4 — Bilan']];
  h += `<div style="display:flex;gap:0;border-bottom:0.5px solid var(--bd);margin-bottom:16px">`;
  for (const [id, label] of tabs) {
    const on = subPhase === id;
    h += `<button onclick="window._bbSubPhase='${id}';render()" style="padding:8px 16px;font-size:12px;font-weight:${on?'600':'400'};border:none;background:none;cursor:pointer;color:${on?'var(--tx)':'var(--tx2)'};border-bottom:2px solid ${on?'var(--b,#378add)':'transparent'}">${label}</button>`;
  }
  h += `</div>`;

  if (subPhase === 'plan') {
    h += renderBBPlan(c, cas, e, asin, mkt);
  } else if (subPhase === 'suivi') {
    h += renderBBSuivi(c, cas, e, asin);
  } else if (subPhase === 'bilan') {
    h += renderBBBilan(c, cas, e, asin);
  }

  return h;
}

function renderBBPlan(c, cas, e, asin, mkt) {
  const a = c.asins.find(x => x.asin === asin) || {};

  // ── Sparkline ─────────────────────────────────────────────────
  const hist = (a.history || []).slice(-10).filter(h => parseNum(h.retailPct) > 0 || (h.revenue||0) > 0);
  const svgW = 300, svgH = 50, pad = 4;
  const pts = hist.map((d,i) => {
    const x = hist.length > 1 ? pad + i*(svgW-2*pad)/(hist.length-1) : svgW/2;
    const y = svgH - pad - (Math.min(parseNum(d.retailPct)||0,100)/100)*(svgH-2*pad);
    return `${x},${y}`;
  }).join(' ');
  const sparkline = hist.length >= 2
    ? `<svg viewBox="0 0 ${svgW} ${svgH}" style="width:100%;height:44px;display:block">
        <line x1="0" y1="${svgH-pad-(95/100)*(svgH-2*pad)}" x2="${svgW}" y2="${svgH-pad-(95/100)*(svgH-2*pad)}" stroke="#3b6d11" stroke-width="1" stroke-dasharray="3,3" opacity=".4"/>
        <polyline points="${pts}" fill="none" stroke="#378add" stroke-width="1.5" stroke-linejoin="round"/>
        ${hist.map((d,i)=>{const x=hist.length>1?pad+i*(svgW-2*pad)/(hist.length-1):svgW/2;const rp=parseNum(d.retailPct)||0;const y=svgH-pad-(Math.min(rp,100)/100)*(svgH-2*pad);return `<circle cx="${x}" cy="${y}" r="3" fill="${rp<80?'#e24b4a':rp<95?'#ef9f27':'#639922'}"/>`;}).join('')}
      </svg>`
    : `<p style="font-size:11px;color:var(--tx3);margin:0">Pas encore d\u2019historique — visible après plusieurs imports hebdomadaires</p>`;

  // ── Corrélation CA/retailPct ───────────────────────────────────
  const histFull = hist.filter(h => parseNum(h.retailPct) > 0 && (h.revenue||0) > 0);
  let corrBlock = '';
  if (histFull.length >= 4) {
    const n = histFull.length, sumX = histFull.reduce((s,h)=>s+parseNum(h.retailPct),0),
      sumY = histFull.reduce((s,h)=>s+(h.revenue||0),0),
      sumXY = histFull.reduce((s,h)=>s+parseNum(h.retailPct)*(h.revenue||0),0),
      sumX2 = histFull.reduce((s,h)=>s+Math.pow(parseNum(h.retailPct),2),0),
      denom = n*sumX2 - sumX*sumX;
    if (denom !== 0) {
      const slope = Math.round((n*sumXY - sumX*sumY)/denom);
      if (slope > 0) corrBlock = `<div style="font-size:11px;color:var(--tx2);margin-top:6px;padding:6px 8px;background:var(--b-l,#e6f1fb);border-radius:var(--rd)">Chaque point de Featured Offer perdu ≈ <strong>${fmtEur(Math.abs(slope))}</strong>/semaine (${n} sem.)</div>`;
    }
  }

  // ── Suggestion bbKnowledge ─────────────────────────────────────
  const suggestion = bbKnowledgeSuggestion(c, e.cause);
  const suggBlock = suggestion
    ? `<div style="padding:8px 12px;background:#eaf3de;border-left:3px solid #639922;border-radius:0 var(--rd) var(--rd) 0;font-size:12px;margin-bottom:12px">
        Sur ${suggestion.total} cas similaires, "<em>${suggestion.action}</em>" a réussi ${suggestion.successRate}% du temps (~${suggestion.avgWeeks} sem.)
      </div>` : '';

  // ── Alerte double urgence stock ────────────────────────────────
  const stockAlert = (e.cause === 'stock' || e.stockUrgent)
    ? `<div class="alr alr-r" style="margin-bottom:10px;font-size:12px">
        🔗 <strong>Double urgence</strong> — Buy Box + stock critique : ${e.couvertureSem !== null ? `<strong>${Number(e.couvertureSem).toFixed(1)} semaines</strong>` : 'couverture inconnue'}
        <button class="btn btn-sm" style="background:#e24b4a;color:#fff;border-color:#e24b4a;margin-left:8px" onclick="window._approsAsin='${asin}';go('appros')">Voir Appros →</button>
      </div>` : '';

  // ── Résultat IA éventuel déjà stocké ──────────────────────────
  const iaResult = cas.iaResult || null;
  const currentNote = (cas.note || '').replace(/"/g, '&quot;');
  const currentAction = cas.action || '';
  const actions = ['Coupon temporaire (recommandé — sans baisser le catalogue)','Baisse de prix catalogue','Signalement Brand Registry','Email Vendor Central','Commande réappro urgente','Autre'];

  // ── Liens Vendor Central directs ──────────────────────────────
  const vcBase = 'https://vendor.amazon.fr';
  const vcLinks = {
    pricing:  vcBase + '/pricing/health',
    catalog:  vcBase + '/catalog',
    coupons:  vcBase + '/promotions/coupons',
    registry: 'https://brandregistry.amazon.fr',
    support:  vcBase + '/support',
    orders:   vcBase + '/orders/purchaseOrders',
  };
  const amazonUrl = `https://www.amazon${mkt||'.fr'}/dp/${asin}`;

  // ── Définition des steps ACTIONNABLES ─────────────────────────
  // Structure : {id, t, d, ctas:[{label,url?,onclick?,primary?}], iaField?}
  const stepsMap = {
    prix_3p: [
      { id:0,
        t: 'Qui a pris ma Featured Offer ?',
        d: 'L\u2019IA analyse la fiche Amazon en direct et vous dit immédiatement qui détient la Buy Box et à quel prix.',
        ctas: [
          { label: cas.iaLoading ? 'Analyse...' : (cas.iaResult ? 'Relancer' : 'Analyser avec l’IA'), onclick: "analyseBuyBoxLive('" + asin + "','" + (mkt||'.fr') + "',cl())", primary: true },
          { label: 'Voir la fiche Amazon', url: amazonUrl },
        ],
        iaField: 'concurrent',
      },
      { id:1,
        t: 'Quel est l\u2019écart de prix ?',
        d: iaResult?.prixConcurrent
          ? `Concurrent : <strong>${esc(iaResult.prixConcurrent)}</strong> · Votre prix : <strong>${fmtEur(parseNum(a.price||0)||0)}</strong>`
          : 'Rempli automatiquement après l\u2019analyse IA — ou saisissez manuellement.',
        ctas: [],
        iaField: 'prixConcurrent',
        input: true,
        inputPlaceholder: 'Ex: concurrent à 11,90 €, votre prix 14,50 €…',
        inputKey: 'prixConcurrent',
      },
      { id:2,
        t: 'Vérifier Pricing Health dans Vendor Central',
        d: 'Amazon signale ici les ASINs avec un prix jugé non compétitif (Competitive External Price).',
        ctas: [
          { label: 'Ouvrir Pricing Health VC', url: vcLinks.pricing, primary: true },
        ],
      },
      { id:3,
        t: 'Ajuster le prix ou lancer un coupon',
        d: 'Commencez par un coupon temporaire — vous testez l\u2019impact sans baisser définitivement votre prix catalogue.',
        ctas: [
          { label: 'Créer un coupon dans VC', url: vcLinks.coupons, primary: true },
          { label: 'Gérer les prix VC', url: vcLinks.pricing },
        ],
      },
      { id:4,
        t: 'Le 3P est-il un distributeur non autorisé ?',
        d: 'Si le vendeur tiers n\u2019est pas agréé pour distribuer votre marque, vous pouvez le signaler via Brand Registry.',
        ctas: [
          { label: 'Ouvrir Brand Registry', url: vcLinks.registry },
        ],
      },
    ],
    stock: [
      { id:0,
        t: 'Passer une commande de réappro en urgence',
        d: 'Le stock est insuffisant — Amazon retire la Featured Offer des produits à risque de rupture.',
        ctas: [
          { label: 'Voir mes Appros pour cet ASIN', onclick: `window._approsAsin='${asin}';go('appros')`, primary: true },
          { label: 'POs en cours dans VC', url: vcLinks.orders },
        ],
      },
      { id:1, t: 'Vérifier les POs en attente de confirmation', d: 'Un PO non confirmé bloque le réappro sans alerte visible.',
        ctas: [{ label: 'POs en attente VC', url: vcLinks.orders, primary: true }] },
      { id:2, t: 'Activer le stock de sécurité si disponible', d: 'Éviter le stock à zéro en FBA pendant l\u2019attente du réappro.',
        ctas: [] },
      { id:3, t: 'Surveiller la Buy Box après réappro', d: 'La Featured Offer revient généralement sous 48-72h après reconstitution du stock.',
        ctas: [] },
    ],
    suppression: [
      { id:0, t: 'Vérifier que la fiche est encore visible sur Amazon', d: 'Si le produit n\u2019apparaît plus, c\u2019est une suppression active.',
        ctas: [{ label: 'Ouvrir la fiche Amazon', url: amazonUrl, primary: true }] },
      { id:1, t: 'Contrôler le catalogue dans VC', d: 'Statut de la fiche, variations, suppressions partielles.',
        ctas: [{ label: 'Catalogue VC', url: vcLinks.catalog, primary: true }] },
      { id:2, t: 'Vérifier Pricing Health et Account Health', d: 'Prix trop haut ou trop bas peut suspendre l\u2019éligibilité.',
        ctas: [{ label: 'Pricing Health VC', url: vcLinks.pricing, primary: true }] },
      { id:3, t: 'Ouvrir un cas Vendor Support en urgence', d: 'Si tout est conforme et la fiche reste invisible.',
        ctas: [{ label: 'Ouvrir un cas Support VC', url: vcLinks.support, primary: true }] },
    ],
    po_unconfirmed: [
      { id:0,
        t: 'Confirmer le PO en urgence dans Vendor Central',
        d: 'Amazon a émis une commande — taux de confirmation = 0%. Sans confirmation, Amazon réduit ses futures commandes.',
        ctas: [{ label: 'Ouvrir les POs dans VC', url: 'https://vendor.amazon.fr/orders/purchaseOrders', primary: true }]
      },
      { id:1,
        t: 'Identifier pourquoi la confirmation est à 0%',
        d: 'Problème EDI ? Délai trop court ? Rupture chez le fournisseur ? Identifier la cause avant de confirmer.',
        ctas: []
      },
      { id:2,
        t: 'Contacter votre Account Manager Amazon',
        d: 'Si le PO est bloqué administrativement, votre AM peut débloquer rapidement.',
        ctas: [{ label: 'Support Vendor Central', url: 'https://vendor.amazon.fr/support' }]
      },
      { id:3,
        t: 'Surveiller la Buy Box après confirmation',
        d: 'Dès le stock Amazon reconstitué, la Featured Offer revient sous 48-72h.',
        ctas: []
      },
    ],
    surveillance: [
      { id:0, t: 'Ouvrir la fiche Amazon et observer', d: 'Y a-t-il un nouveau vendeur tiers ? Le prix est-il toujours compétitif ?',
        ctas: [{ label: 'Voir la fiche Amazon', url: amazonUrl, primary: true }] },
      { id:1, t: 'Contrôler le stock disponible', d: 'Un stock bas peut déclencher une perte progressive de Featured Offer.',
        ctas: [{ label: 'Voir mes Appros', onclick: `window._approsAsin='${asin}';go('appros')` }] },
      { id:2, t: 'Attendre l\u2019import de la semaine prochaine', d: 'Si c\u2019est une baisse ponctuelle, elle peut se corriger seule.',
        ctas: [] },
    ],
  };

  const steps = stepsMap[e.cause] || stepsMap['surveillance'];

  // ── RENDU ─────────────────────────────────────────────────────
  let h = `<div style="display:grid;grid-template-columns:1fr 1.3fr;gap:16px;align-items:start">`;

  // ── Colonne gauche : sparkline + note ─────────────────────────
  h += `<div>
    <div class="cd" style="margin-bottom:12px">
      <div class="cd-t">Évolution Featured Offer</div>
      <div style="padding:8px 0">${sparkline}${corrBlock}</div>
    </div>`;

  // Données PO réelles (CSV PO importé)
  const poD = getPOData(c, asin);
  const guideAsnBtn = '<div style="margin-bottom:10px;padding:8px 12px;background:var(--b-l,#e6f1fb);border-radius:var(--rd);display:flex;align-items:center;gap:8px;font-size:11px">' + '<span>&#128203;</span>' + '<span style="flex:1;color:var(--tx2)">Probl\u00e8me d\'\u00e9cart ASN/r\u00e9ception ?</span>' + '<button class="btn btn-sm" onclick="downloadGuideASN()" style="font-size:10px;padding:4px 8px">Guide ASN/BOL &#8595;</button>' + '</div>';
  // Alerte PO non confirme
  const openPOdisp = parseNum((a && a.openPOQty) || 0);
  const cpctDisp = parseNum(String((a && a.confirmPct) || '0').replace(',','.').replace(/[^0-9.]/g,''));
  const poAlert = poD && (poD.fillRate < 80 || poD.isPermanentOOS || poD.isDiscontinued)
    ? '<div class="alr ' + (poD.isPermanentOOS || poD.isDiscontinued ? 'alr-r' : 'alr-a') + '" style="margin-bottom:10px;font-size:12px">'
      + (poD.isDiscontinued ? '<strong>Fin de série (CP)</strong> — ' : poD.isPermanentOOS ? '<strong>Rupture permanente (CK)</strong> — ' : '<strong>Fill rate faible</strong> — ')
      + 'Fill rate : <strong>' + poD.fillRate + '%</strong>'
      + ' · ' + poD.totalAccepted + '/' + poD.totalAsked + ' unités acceptées'
      + (poD.refusCount > 0 ? ' · ' + poD.refusCount + ' refus | Dernier : ' + poD.lastCancelReason.slice(0,40) : '')
      + '<br><a href="https://vendor.amazon.fr/orders/purchaseOrders" target="_blank" style="display:inline-block;margin-top:6px;font-size:11px;font-weight:500;padding:4px 10px;border-radius:var(--rd);background:#e24b4a;color:#fff;text-decoration:none">Voir POs dans VC →</a>'
      + '</div>'
    : (e.cause === 'po_unconfirmed' || (openPOdisp > 0 && cpctDisp < 50))
    ? '<div class="alr alr-r" style="margin-bottom:10px;font-size:12px">'
      + '<strong>PO non confirmé</strong> — Amazon a commandé <strong>' + openPOdisp + ' unités</strong>'
      + ' · Confirmation : <strong>' + cpctDisp.toFixed(0) + '%</strong><br>'
      + 'Confirmer dans Vendor Central.'
      + '<a href="https://vendor.amazon.fr/orders/purchaseOrders" target="_blank" style="display:inline-block;margin-top:6px;font-size:11px;font-weight:500;padding:4px 10px;border-radius:var(--rd);background:#e24b4a;color:#fff;text-decoration:none">POs VC →</a>'
      + '</div>'
    : '';

  if (suggBlock) h += suggBlock;
  if (poAlert) { h += poAlert; h += guideAsnBtn; }
  if (stockAlert) h += stockAlert;

  // Resultat IA
  if (cas.iaLoading) {

    h += '<div class="cd" style="margin-bottom:12px;border-left:3px solid #e24b4a;border-radius:0 var(--rd) var(--rd) 0">'
      + '<div class="cd-t">Résultat analyse IA</div>'
      + '<div style="font-size:12px;padding:6px 0;line-height:1.7">'
      + (r.vendeurBB ? '<div><strong>Featured Offer :</strong> ' + esc(r.vendeurBB) + (r.isPrime ? ' · Prime' : '') + '</div>' : '')
      + (r.prixBB ? '<div><strong>Prix Buy Box :</strong> ' + esc(r.prixBB) + '</div>' : '')
      + (r.ecartPrix ? '<div><strong>Écart vs fournisseur :</strong> ' + esc(r.ecartPrix) + '</div>' : '')
      + (r.autresOffres ? '<div style="color:var(--tx2);margin-top:2px">' + esc(r.autresOffres) + '</div>' : '')
      + (r.causeProb ? '<div style="margin-top:6px;padding:6px 8px;background:var(--or-bg,#fff8ee);border-radius:var(--rd);"><strong>Cause :</strong> ' + esc(r.causeProb) + '</div>' : '')
      + (r.actionReco ? '<div style="margin-top:4px;padding:6px 8px;background:#eaf3de;border-radius:var(--rd);color:#3b6d11"><strong>Action :</strong> ' + esc(r.actionReco) + '</div>' : '')
      + '</div></div>';
  }

  // Résultat IA si disponible
  if (iaResult) {
    h += `<div class="cd" style="margin-bottom:12px;border-left:3px solid #e24b4a;border-radius:0 var(--rd) var(--rd) 0">
      <div class="cd-t">Résultat analyse IA</div>
      <div style="font-size:12px;line-height:1.6;padding:6px 0">
        ${iaResult.concurrent ? `<div><strong>Featured Offer :</strong> ${esc(iaResult.concurrent)}</div>` : ''}
        ${iaResult.prixConcurrent ? `<div><strong>Prix concurrent :</strong> ${esc(iaResult.prixConcurrent)}</div>` : ''}
        ${iaResult.diagnostic ? `<div style="margin-top:4px;color:var(--tx2)">${esc(iaResult.diagnostic)}</div>` : ''}
      </div>
    </div>`;
  }

  // Action choisie + note
  h += `<div class="cd">
    <div class="cd-t">Votre décision</div>
    <div style="margin-bottom:10px">
      <div style="font-size:11px;color:var(--tx2);margin-bottom:5px">Action choisie</div>
      <select onchange="bbGetCase(cl(),'${asin}').action=this.value;save()" style="width:100%;font-size:12px;padding:7px 8px;border-radius:var(--rd);border:0.5px solid var(--bd);background:var(--bg);color:var(--tx)">
        <option value="">— Sélectionner une action —</option>
        ${actions.map(act=>`<option value="${esc(act)}"${currentAction===act?' selected':''}>${esc(act)}</option>`).join('')}
      </select>
    </div>
    <div>
      <div style="font-size:11px;color:var(--tx2);margin-bottom:5px">Note (concurrent identifié, prix cible…)</div>
      <textarea onchange="bbGetCase(cl(),'${asin}').note=this.value;save()" placeholder="Ex: Pièces Auto Discount à 11,90 €, prix cible 12,50 €" style="width:100%;font-size:12px;padding:7px 8px;border-radius:var(--rd);border:0.5px solid var(--bd);background:var(--bg);color:var(--tx);resize:vertical;min-height:56px">${currentNote}</textarea>
    </div>
    <button class="btn btn-p" style="width:100%;margin-top:10px;font-size:12px" onclick="window._bbSubPhase='suivi';render()">Valider → passer au suivi</button>
  </div>`;

  h += `</div>`;

  // ── Colonne droite : steps actionnables ───────────────────────
  h += `<div class="cd">
    <div class="cd-t">Que faire maintenant — étape par étape</div>`;

  for (const s of steps) {
    const done = cas.steps && cas.steps[s.id];
    const hasCtas = s.ctas && s.ctas.length > 0;
    h += `<div style="padding:12px 0;border-bottom:0.5px solid var(--bd)">
      <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:${hasCtas?'8':'0'}px">
        <input type="checkbox" ${done?'checked':''} style="margin-top:2px;flex-shrink:0;width:15px;height:15px;cursor:pointer"
          onchange="if(!bbGetCase(cl(),'${asin}').steps)bbGetCase(cl(),'${asin}').steps={};bbGetCase(cl(),'${asin}').steps[${s.id}]=this.checked;save()">
        <div style="flex:1">
          <div style="font-size:12px;font-weight:600;${done?'text-decoration:line-through;color:var(--tx3)':''}">${esc(s.t)}</div>
          <div style="font-size:11px;color:var(--tx2);margin-top:2px;line-height:1.4">${s.d}</div>
          ${s.input ? `<input type="text" placeholder="${esc(s.inputPlaceholder||'')}"
            value="${esc((cas[s.inputKey]||'').replace(/"/g,'&quot;'))}"
            onchange="bbGetCase(cl(),'${asin}')['${s.inputKey||'note'}']=this.value;save()"
            style="width:100%;margin-top:6px;font-size:11px;padding:5px 8px;border-radius:var(--rd);border:0.5px solid var(--bd);background:var(--bg);color:var(--tx)">` : ''}
        </div>
      </div>`;

    if (hasCtas) {
      h += `<div style="display:flex;gap:6px;flex-wrap:wrap;padding-left:25px">`;
      for (const cta of s.ctas) {
        if (cta.url) {
          h += `<a href="${cta.url}" target="_blank"
            onclick="if(!bbGetCase(cl(),'${asin}').steps)bbGetCase(cl(),'${asin}').steps={};bbGetCase(cl(),'${asin}').steps[${s.id}]=true;save();render()"
            style="display:inline-block;font-size:11px;font-weight:500;padding:5px 12px;border-radius:var(--rd);text-decoration:none;
            ${cta.primary?'background:#e24b4a;color:#fff;border:0.5px solid #e24b4a':'background:var(--s2);color:var(--tx);border:0.5px solid var(--bd)'}">${esc(cta.label)} →</a>`;
        } else if (cta.onclick) {
          h += `<button onclick="${cta.onclick};if(!bbGetCase(cl(),'${asin}').steps)bbGetCase(cl(),'${asin}').steps={};bbGetCase(cl(),'${asin}').steps[${s.id}]=true;save();render()"
            style="font-size:11px;font-weight:500;padding:5px 12px;border-radius:var(--rd);cursor:pointer;
            ${cta.primary?'background:#e24b4a;color:#fff;border:0.5px solid #e24b4a':'background:var(--s2);color:var(--tx);border:0.5px solid var(--bd)'}">${esc(cta.label)} →</button>`;
        }
      }
      h += `</div>`;
    }

    h += `</div>`;
  }

  h += `</div></div>`;
  return h;
}

function renderBBSuivi(c, cas, e, asin) {
  const weeks = cas.weeks || [];
  // Mettre à jour la semaine courante avec le retailPct actuel
  const currentWeek = getISOWeek(new Date());

  let h = `<div class="cd" style="margin-bottom:14px">
    <div class="cd-t space">
      <span>Timeline du dossier</span>
      <button class="btn btn-sm" onclick="
        const cas=bbGetCase(cl(),'${asin}');
        const w=getISOWeek(new Date());
        const rp=${e.rPct.toFixed(1)};
        if(!cas.weeks.find(x=>x.week===w)){cas.weeks.push({week:w,rPct:rp,event:'Import S'+w,ts:new Date().toISOString()});}
        save();render()">+ Enregistrer la semaine courante (S${currentWeek} · ${e.rPct.toFixed(0)}%)</button>
    </div>`;

  if (weeks.length === 0) {
    h += `<div style="padding:16px;text-align:center;color:var(--tx3);font-size:12px">Aucune entrée — cliquez sur le bouton pour enregistrer la semaine courante</div>`;
  } else {
    h += `<div style="padding:8px 0">`;
    for (let i = 0; i < weeks.length; i++) {
      const w = weeks[i];
      const isLast = i === weeks.length - 1;
      const rp = w.rPct !== null ? parseFloat(w.rPct) : null;
      const dotColor = rp === null ? 'var(--tx3)' : rp >= 95 ? '#639922' : rp >= 80 ? '#ef9f27' : '#e24b4a';

    }
    h += `</div>`;
  }
  h += `</div>`;

  h += `<div style="display:flex;gap:8px;flex-wrap:wrap">

  </div>`;

  return h;
}

function renderBBBilan(c, cas, e, asin) {
  const isClosed = cas.status === 'closed';
  const durée = cas.weeks.length;

  let h = '';

  if (!isClosed) {
    h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      <button class="btn" style="padding:14px;font-size:12px;text-align:center;background:#eaf3de;border-color:#c0dd97;color:#3b6d11" onclick="bbCloseCase(cl(),'${asin}',true);render()">
        <div style="font-size:20px;margin-bottom:4px">✅</div>
        <div style="font-weight:500">Résolu — ça a fonctionné</div>
        <div style="font-size:11px;opacity:.8;margin-top:2px">Featured Offer récupérée</div>
      </button>
      <button class="btn" style="padding:14px;font-size:12px;text-align:center;background:#fcebeb;border-color:#f09595;color:#a32d2d" onclick="bbCloseCase(cl(),'${asin}',false);render()">

      </button>
    </div>`;
  }

  if (isClosed) {
    const success = cas.success;
    h += `<div style="padding:12px 14px;border-radius:var(--rd);border:0.5px solid ${success?'#c0dd97':'#f09595'};background:${success?'#eaf3de':'#fcebeb'};margin-bottom:14px;font-size:12px">
      <strong>${success ? '✅ Dossier clôturé — résolution confirmée' : '❌ Dossier clôturé — action inefficace'}</strong><br>
      Action utilisée : <em>${esc(cas.action || '—')}</em> · Durée : ${durée} semaine${durée>1?'s':''}
      ${cas.note?`<br>Note : ${esc(cas.note)}`:''}
    </div>`;

    // Règle apprise
    const suggestion = bbKnowledgeSuggestion(c, e.cause);
    if (suggestion) {
      h += `<div style="padding:10px 12px;background:var(--g-bg,#eaf3de);border-left:3px solid #639922;border-radius:0 var(--rd) var(--rd) 0;font-size:12px;margin-bottom:14px">

        Sur ce profil (${e.cause==='prix_3p'?'3P concurrent':e.cause==='stock'?'stock faible':'autre'}), l'action "<em>${suggestion.action}</em>" fonctionne dans ${suggestion.successRate}% des cas en ~${suggestion.avgWeeks} semaines.
        Cette règle sera suggérée automatiquement pour les cas similaires.
      </div>`;
    }
  }

  // KPIs globaux
  const allClosed = bbGetCases(c).filter(x => x.status === 'closed');
  const resolved = allClosed.filter(x => x.success);
  const avgWeeks = allClosed.length ? Math.round(allClosed.reduce((s,x)=>s+x.weeks.length,0)/allClosed.length) : 0;

  h += `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
    <div style="background:var(--s2);border-radius:var(--rd);padding:12px;text-align:center">
      <div style="font-size:22px;font-weight:500;color:${resolved.length>0?'#3b6d11':'var(--tx2)'}">${allClosed.length ? Math.round(resolved.length/allClosed.length*100) : '—'}${allClosed.length?'%':''}</div>
      <div style="font-size:10px;color:var(--tx2);margin-top:3px">Taux de résolution</div>
    </div>
    <div style="background:var(--s2);border-radius:var(--rd);padding:12px;text-align:center">
      <div style="font-size:22px;font-weight:500;color:var(--b,#185fa5)">${avgWeeks || '—'}${avgWeeks?'sem':''}</div>
      <div style="font-size:10px;color:var(--tx2);margin-top:3px">Durée moy. résolution</div>
    </div>
    <div style="background:var(--s2);border-radius:var(--rd);padding:12px;text-align:center">
      <div style="font-size:22px;font-weight:500;color:#3b6d11">${allClosed.length}</div>
      <div style="font-size:10px;color:var(--tx2);margin-top:3px">Cas clôturés</div>
    </div>
  </div>`;

  if (isClosed) {
    h += `<button class="btn btn-sm" style="margin-top:14px" onclick="window._bbPhase='list';window._bbSubPhase='plan';render()">← Retour au tableau</button>`;
  }

  return h;
}

function analyseBuyBoxLive(asin, market, c) {
  const asinData = c && c.asins ? c.asins.find(a => a.asin === asin) : null;
  const units = (asinData && (asinData.units || asinData.shippedUnits)) || 0;
  const revenue = (asinData && (asinData.revenue || asinData.shippedRevenue)) || 0;
  const prixHTCogex = units > 0 ? Math.round((revenue / units / 1.2) * 100) / 100 : null;
  const openPOQ = parseNum((asinData && asinData.openPOQty) || 0);
  const cpct = parseNum(String((asinData && asinData.confirmPct) || '0').replace(',', '.').replace(/[^0-9.]/g, ''));
  const cas = bbGetCase(c, asin);
  if (cas) { cas.iaLoading = true; save(); render(); }
  const amazonUrl = 'https://www.amazon' + (market || '.fr') + '/dp/' + asin;
  const prixCtx = prixHTCogex
    ? ' Prix de vente moyen HT fournisseur = ' + prixHTCogex.toFixed(2) + ' EUR (' + units + ' unites a ' + (revenue/units).toFixed(2) + ' EUR TTC).'
    : '';
  const poCtx = openPOQ > 0 && cpct < 50
    ? ' PO ouvert de ' + openPOQ + ' unites avec confirmation = ' + cpct + '% : cela explique probablement la perte de Buy Box.'
    : '';
  const _bbModelKey = aiUsage.getModel('buybox');
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      model: AI_MODELS[_bbModelKey].id,
      max_tokens: 1000,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{ role: 'user', content:
        'Analyse cette fiche Amazon et réponds en JSON uniquement sans markdown : ' + amazonUrl +
        prixCtx + poCtx +
        ' Contexte important : ce produit appartient à un fournisseur Amazon Vendor (1P). Normalement Amazon détient la Buy Box. Si un vendeur tiers la détient, c\'est anormal et prioritaire.'
        + ' Analyse : 1) qui détient la Featured Offer, 2) est-ce Amazon ou un 3P, 3) si 3P : son prix vs prix fournisseur, 4) cause probable REELLE (stock vide ? 3P moins cher ? éligibilité ?)'
        + ' JSON avec ces champs : {"vendeurBB":"nom vendeur Featured Offer (Amazon ou nom 3P)","prixBB":"prix TTC affiché","isPrime":true/false,"estAmazon":true/false,"autresOffres":"autres vendeurs et prix","stockStatus":"En stock / Stock limité / Rupture","ecartPrix":"si fournisseur connu : écart % entre prix BB et prix fournisseur","causeProb":"cause réelle perte Buy Box en 1 phrase précise","actionReco":"action concrète recommandée en 1 phrase","urgence":"critique/moderee/faible"}'
      }]
    })
  })
  .then(r => r.json())
  .then(data => {
    const _bbTokIn = data.usage?.input_tokens || 0;
    const _bbTokOut = data.usage?.output_tokens || 0;
    if (typeof aiUsage !== 'undefined') aiUsage.record('buybox', _bbModelKey, _bbTokIn, _bbTokOut);
    const c2 = cl(); const cas2 = bbGetCase(c2, asin);
    if (!cas2) return;
    cas2.iaLoading = false;
    const tb = data.content && data.content.find(b => b.type === 'text');
    if (tb && tb.text) {
      try {
        const clean = tb.text.replace(/```json|```/g, '').trim();
        cas2.iaResult = JSON.parse(clean);
      } catch(e) {
        cas2.iaResult = { causeProb: tb.text.slice(0, 300), actionReco: 'Voir note' };
      }
    } else {
      cas2.iaResult = { causeProb: 'Analyse indisponible', actionReco: 'Verifier la connexion' };
    }
    save(); render();
    showToast('Analyse terminée', 'alr-g');
  })
  .catch(err => {
    const c2 = cl(); const cas2 = bbGetCase(c2, asin);
    if (cas2) { cas2.iaLoading = false; save(); render(); }
    showToast('Erreur IA : ' + err.message, 'alr-r');
  });
}

function downloadGuideASN() {
  if (typeof GUIDE_ASN_BOL_B64 === 'undefined' || !GUIDE_ASN_BOL_B64) {
    showToast('Guide non disponible', 'alr-r'); return;
  }
  const byteChars = atob(GUIDE_ASN_BOL_B64);
  const byteArr = new Uint8Array(byteChars.length);
  for (let i = 0; i < byteChars.length; i++) byteArr[i] = byteChars.charCodeAt(i);
  const blob = new Blob([byteArr], {type: 'application/pdf'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Guide_ASN_BOL_Amazon.pdf';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Guide téléchargé', 'alr-g');
}

function copyBuyBoxChromePrompt(asin, market) {
  const prompt = `Tu es un expert Amazon Vendor Central. Analyse la fiche produit ASIN ${asin} sur amazon${market||'.fr'} (https://www.amazon${market||'.fr'}/dp/${asin}).

Réponds précisément :
1. Qui détient la Featured Offer (Buy Box) ? Amazon ou un vendeur tiers ?
2. Si vendeur tiers : nom, prix total livré (produit + port), badge Prime ?
3. Autres offres visibles ("Voir toutes les offres") : combien, fourchette de prix ?
4. Le produit est-il "Expédié et vendu par Amazon" ?
5. Signes de rupture de stock (délai anormal, "En stock le...") ?
6. Y a-t-il des promotions ou coupons actifs sur la fiche ?

Synthèse : cause principale probable de la perte de Featured Offer, et action recommandée en 1 phrase.`;

  navigator.clipboard.writeText(prompt).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = prompt; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
  });
  showToast('Prompt copié — ouvrez Amazon puis collez dans Claude in Chrome', 'alr-g');
}

function _dwParseDate(s) {
  if (!s) return 0;
  if (s.indexOf('/') > -1) { const p = s.split('/'); return new Date(p[2], p[1]-1, p[0]); }
  return new Date(s);
}

function buildWeeklyConsolidated(asins, c, nbWeeks, market) {
  const pref = c?.kpiPrimaireCA || 'ordered';
  const mkt = market || c?.mainMarket || '.fr';
  const byWeek = {};
  asins.forEach(function(a) {
    if ((a.market || '.fr') !== mkt) return;
    (a.history || []).forEach(function(h) {
      const key = h.periodStart || h.period;
      if (!key) return;
      if (!byWeek[key]) byWeek[key] = { key: key, ca: 0, units: 0, gv: 0, stock: 0, n: 0 };
      byWeek[key].ca    += a.sourcingOnly ? 0 : (h.revenue || 0);
      byWeek[key].units += a.sourcingOnly ? 0 : (h.units || 0);
      byWeek[key].gv    += h.glanceViews || 0;
      byWeek[key].stock += h.sellableUnits || 0;
      byWeek[key].n++;
    });
  });
  return Object.values(byWeek).sort(function(a,b){ return _dwParseDate(a.key)-_dwParseDate(b.key); }).slice(-nbWeeks);
}

function buildMonthlyConsolidated(asins, c, nbMonths, market) {
  const weeks = buildWeeklyConsolidated(asins, c, 260, market);
  const byMonth = {};
  weeks.forEach(function(w) {
    const d = _dwParseDate(w.key);
    if (!d || isNaN(d)) return;
    const mKey = ('0'+(d.getMonth()+1)).slice(-2) + '/' + d.getFullYear();
    if (!byMonth[mKey]) byMonth[mKey] = { key: mKey, ca: 0, units: 0, gv: 0, stock: 0, n: 0 };
    byMonth[mKey].ca    += w.ca;
    byMonth[mKey].units += w.units;
    byMonth[mKey].gv    += w.gv;
    byMonth[mKey].stock  = Math.max(byMonth[mKey].stock, w.stock);
    byMonth[mKey].n++;
  });
  return Object.values(byMonth).sort(function(a,b){
    const pa = a.key.split('/'); const pb = b.key.split('/');
    return (new Date(pa[1],pa[0]-1) - new Date(pb[1],pb[0]-1));
  }).slice(-nbMonths);
}

function buildN1Series(c, weeks, market) {
  const n1Year = String(new Date().getFullYear() - 1);
  const mkt = market || c?.mainMarket || '.fr';
  const n1Map = {};
  (c.asins || []).forEach(function(a) {
    if ((a.market || '.fr') !== mkt) return;
    (a.history || []).forEach(function(h) {
      const key = h.periodStart || h.period;
      if (!key) return;
      let year;
      if (key.indexOf('/') > -1) { year = key.split('/')[2]; }
      else if (key.length >= 4) { year = key.slice(0, 4); }
      if (year !== n1Year) return;
      if (!n1Map[key]) n1Map[key] = 0;
      n1Map[key] += (h.orderedRevenue || h.revenue || 0);
    });
  });
  if (Object.keys(n1Map).length < 4) return null;
  return weeks.map(function(w) {
    const d = (w.key || '').split('/');
    if (d.length < 3) return null;
    const n1Key = d[0] + '/' + d[1] + '/' + n1Year;
    return n1Map[n1Key] || null;
  });
}

function buildDashWeeklyChartConfig(periods, c, isMonthly) {

  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
  const tickColor = isDark ? '#aaa' : '#666';
  const datasets = [
    {
      type: 'bar',
      label: c?.kpiPrimaireCA === 'shipped' ? 'CA Expédié (€)' : 'CA Commandé (€)',
      data: periods.map(function(w) { return w.ca; }),
      backgroundColor: 'rgba(255,153,0,0.7)',
      yAxisID: 'yCA', order: 3
    },
    {
      type: 'line', label: 'Glance Views',
      data: periods.map(function(w) { return w.gv; }),
      borderColor: '#3b82f6', backgroundColor: 'transparent',
      tension: 0.3, pointRadius: 2, yAxisID: 'yGV', order: 1
    },
    {

      borderColor: '#10b981', backgroundColor: 'transparent',

      borderColor: 'rgba(150,150,150,0.5)', borderDash: [4,4],

    });
  }
  return {
    type: 'bar',
    data: {
      labels: periods.map(function(w) { return (w.key||'').slice(0,5); }),
      datasets: datasets
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        yCA: { type:'linear', position:'left',  grid:{color:'rgba(128,128,128,0.1)'}, ticks:{color:tickColor, callback:function(v){return Math.round(v/1000)+'k€';}} },
        yGV: { type:'linear', position:'right', grid:{drawOnChartArea:false}, ticks:{color:'#888', callback:function(v){return Math.round(v/1000)+'k';}} },
        x:   { ticks:{color:tickColor, maxTicksLimit:14}, grid:{color:'rgba(128,128,128,0.1)'} }
      },
      plugins: {

          if (ctx.dataset.yAxisID==='yCA') return ctx.dataset.label+': '+fmtEur(ctx.parsed.y);
          return ctx.dataset.label+': '+fmt(ctx.parsed.y);
        }}}
      }
    }
  };
}

function initDashWeeklyChart() {
  const canvas = document.getElementById('dash-weekly-chart');
  if (!canvas) return;
  const c = cl();
  if (!c) return;
  if (!dashWeeklyActiveMkt) dashWeeklyActiveMkt = c.mainMarket || '.fr';
  const isMonthly = dashWeeklyView === 'mois';
  const allAsins = getFilteredAsins(c);
  const periods = isMonthly
    ? buildMonthlyConsolidated(allAsins, c, 24, dashWeeklyActiveMkt)
    : buildWeeklyConsolidated(allAsins, c, 52, dashWeeklyActiveMkt);
  if (periods.length < 2) return;
  const chartH = dashWeeklyView === 'semaines'
    ? Math.min(260, Math.max(120, periods.length * 6))
    : Math.min(260, Math.max(120, periods.length * 22));
  if (canvas.parentElement) canvas.parentElement.style.height = chartH + 'px';
  if (dashWeeklyChartInst) { dashWeeklyChartInst.destroy(); dashWeeklyChartInst = null; }
  dashWeeklyChartInst = new Chart(canvas.getContext('2d'), buildDashWeeklyChartConfig(periods, c, isMonthly));

  // KPIs synthétiques
  const kpiEl = document.getElementById('dash-weekly-kpis');
  if (!kpiEl) return;
  const total = periods.reduce(function(s,w){ return s+w.ca; }, 0);
  const avg = Math.round(total / periods.length);
  const half = Math.floor(periods.length / 2);
  const s1avg = half > 0 ? periods.slice(0, half).reduce(function(s,w){return s+w.ca;},0)/half : 0;
  const s2avg = half > 0 ? periods.slice(half).reduce(function(s,w){return s+w.ca;},0)/(periods.length-half) : 0;
  const trend = s1avg > 0 ? Math.round((s2avg-s1avg)/s1avg*100) : 0;
  const trendStr = trend > 0 ? '+'+trend+'%' : trend+'%';
  const trendColor = trend > 0 ? 'var(--g)' : trend < 0 ? 'var(--a-r)' : 'var(--tx3)';
  const n1arr = isMonthly ? null : buildN1Series(c, periods, dashWeeklyActiveMkt);
  const n1total = n1arr ? n1arr.reduce(function(s,v){return s+(v||0);},0) : 0;
  const n1pct = n1total > 0 ? Math.round((total-n1total)/n1total*100) : null;
  const n1str = n1pct !== null ? (n1pct>0?'+':'')+n1pct+'% vs N-1' : 'N-1 indisponible';
  const n1color = n1pct !== null ? (n1pct>0?'var(--g)':n1pct<0?'var(--a-r)':'var(--tx3)') : 'var(--tx3)';
  kpiEl.innerHTML = '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;font-size:11px;">'
    +'<span style="background:var(--s2);border-radius:6px;padding:4px 10px"><b>Moy. '+( isMonthly?'mensuelle':'hebdo' )+'</b> '+fmtEur(avg)+'</span>'
    +'<span style="background:var(--s2);border-radius:6px;padding:4px 10px"><b>Tendance</b> <span style="color:'+trendColor+'">'+trendStr+'</span></span>'
    +'<span style="background:var(--s2);border-radius:6px;padding:4px 10px"><b>Périodes</b> '+periods.length+'</span>'
    +'<span style="background:var(--s2);border-radius:6px;padding:4px 10px;color:'+n1color+'">'+n1str+'</span>'
    +'</div>';
}

  h += `<div class="cd"><div class="cd-t space">
    <span>📦 ASINs ${searchActive ? '<span style="color:var(--or);font-size:11px">— ' + asins.length + ' résultat' + (asins.length>1?'s':'') + ' pour \"' + esc(asinSearch) + '\"</span>' : '(' + asins.length + ')'}</span>
    <button class="btn btn-sm" onclick="exportAsinsCsv()">${exportLabel} CSV</button><button class="btn btn-sm" onclick="exportAsinsXlsx()" style="margin-left:4px">⬇ XLSX</button>
  </div>`;
  // Période courante détectée
  const latestImport = c.imports?.filter(i=>i.periodType==='weekly'||!i.periodType).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  const periodInfo = latestImport ? `${latestImport.periodStart||''} → ${latestImport.periodEnd||''}` : null;

  h += `<div class="tbl-wrap"><table class="tbl"><thead><tr>
    <th style="width:44px">Score</th>
    <th>Produit ${periodInfo ? '<span style="font-weight:400;color:var(--tx3);font-size:9px;margin-left:6px">'+periodInfo+'</span>' : ''}</th>
    <th>Seg.</th>
    <th class="r">CA</th><th class="r">Δ</th><th>Tendance</th><th class="r">GV</th><th class="r">Stock</th><th></th>
  </tr></thead><tbody>`;

  asins.sort((a,b) => (getRevenue(b,c)||0)-(getRevenue(a,c)||0)).slice(0, 50).forEach(a => {
    const health = calcHealth(a);
    const hCls = healthClass(health);
    const seg = calcSegment(a, totalCA, c);
    const isLow = a.sellableUnits > 0 && a.sellableUnits < 50;
    const isDec = (getRevenue(a,c)||0) > 0 && parseNum(a.revenueDelta) < -10;
    const rc = isDec ? 'al-row' : isLow ? 'warn-row' : '';
    h += `<tr class="${rc}">
      <td><div class="hs hs-sm ${hCls}">${health}</div></td>
      <td style="max-width:220px">
        <div style="font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${esc(a.title)}">${esc(shortName(a))}</div>
        <div class="mono" style="font-size:10px;color:var(--tx3)">${a.asin}</div>
      </td>
      <td>${segBadge(seg)}</td>
      <td class="r" style="font-weight:600">${fmtEur(getRevenue(a,c)||0)}</td>
      <td class="r">${deltaBadge(a.revenueDelta)}</td>
      <td>
        <div style="display:flex;align-items:center;gap:5px">
          ${(() => { const t = calcTrend(a); return sparkline(t?.series, t?.cls) + trendBadge(t); })()}
        </div>
      </td>
      <td class="r">${fmt(a.glanceViews||0)}</td>
      <td class="r">${a.sellableUnits ? fmt(a.sellableUnits)+'u' : '—'}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-xs" onclick="analyzeAsin('${esc(a.asin)}')" title="Analyser">📊</button>
        <button class="btn btn-xs btn-amazon" onclick="openAmazonProduct('${esc(a.asin)}','${a.market||'.fr'}')" title="Amazon">🔗</button>
      </td>
    </tr>`;
  });
  h += `</tbody></table></div>`;
  if (asins.length > 50) h += `<p style="font-size:10px;color:var(--tx3);margin-top:6px">50 premiers sur ${asins.length}</p>`;
  h += `</div>`;
  return h;
}

function copyText(text) {
  navigator.clipboard.writeText(text).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  });
  // Feedback visuel sur le bouton cliqué
  const btn = event.target;
  const orig = btn.textContent;
  btn.textContent = '✓ Copié !';
  btn.style.background = 'var(--g-bg)';
  btn.style.color = 'var(--g)';
  setTimeout(() => { btn.textContent = orig; btn.style.background=''; btn.style.color=''; }, 1800);
}
function renderAsins() {
  const c = cl();
  if (!c?.asins?.length) return `<div class="alr alr-a">Importez d'abord des données CSV.</div>`;
  const asins = getFilteredAsins(c);
  const totalCA = asins.reduce((s, a) => s + (getRevenue(a,c)||0), 0);
  const withRevenue = asins.filter(a => (getRevenue(a,c)||0) > 0);
  let h = '';

  if (!selectedAsin) {
    // ── Calcul des vues disponibles ──────────────────────────────
    const allAsinsForViews = c.asins;
    const totalCAAll = allAsinsForViews.reduce((s,a) => s+(getRevenue(a,c)||0), 0);
    const countLowStock = allAsinsForViews.filter(a => {
      const oos = parseNum(a.oosPct);
      return (getRevenue(a,c)||0) > 50 && ((oos > 0 && oos < 90) || (a.sellableUnits != null && a.sellableUnits >= 0 && a.sellableUnits < 30));
    }).length;
    const countDeclining = allAsinsForViews.filter(a => (getRevenue(a,c)||0)>0 && parseNum(a.revenueDelta) <= -10).length;
    const countGrowing   = allAsinsForViews.filter(a => (getRevenue(a,c)||0)>0 && parseNum(a.revenueDelta) >= 20).length;
    const countA = allAsinsForViews.filter(a => calcSegment(a, totalCAAll, c) === 'A').length;
    const countB = allAsinsForViews.filter(a => calcSegment(a, totalCAAll, c) === 'B').length;
    const countC = allAsinsForViews.filter(a => calcSegment(a, totalCAAll, c) === 'C').length;
    const countAll = allAsinsForViews.filter(a => (getRevenue(a,c)||0)>0).length;

    // ── Vues prédéfinies ─────────────────────────────────────────
    const views = [
      { id:'all',       icon:'📦', label:'Tous',       count: countAll,      color:'gr' },
      { id:'lowstock',  icon:'🔴', label:'Ruptures',   count: countLowStock, color:'r'  },
      { id:'declining', icon:'📉', label:'Baisses',    count: countDeclining,color:'a'  },
      { id:'growing',   icon:'🚀', label:'Croissance', count: countGrowing,  color:'g'  },
      { id:'seg-a',     icon:'🥇', label:'Segment A',  count: countA,        color:'b'  },
      { id:'seg-b',     icon:'🥈', label:'Segment B',  count: countB,        color:'b'  },
      { id:'seg-c',     icon:'🥉', label:'Segment C',  count: countC,        color:'gr' },
    ];

    h += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">';
    views.forEach(v => {
      const isActive = asinView === v.id;
      const hasAlert = (v.id === 'lowstock' && v.count > 0) || (v.id === 'declining' && v.count > 0);
      h += '<button class="btn btn-sm' + (isActive ? ' btn-p' : '') + '" style="position:relative;' + (hasAlert && !isActive ? 'border-color:var(--' + v.color + ');color:var(--' + v.color + ')' : '') + '" onclick="goFilteredAsins(' + JSON.stringify(v.id) + ')">';

    if (asinView !== 'all') {
      h += '<button class="btn btn-xs" style="margin-left:auto;color:var(--tx3)" onclick="asinView=\'all\';asinViewAsins=null;asinSort=\'ca_desc\';render()">✕ Réinitialiser</button>';
    }
    h += '</div>';

    // ── Bandeau contextuel selon la vue ─────────────────────────
    const viewMeta = {
      lowstock:  { color:'r', label:'🔴 Vue : Ruptures imminentes', desc:'Stock < 30u ou disponibilité < 90% sur produits actifs' },
      declining: { color:'a', label:'📉 Vue : ASINs en baisse', desc:'CA en recul de plus de 10% vs semaine précédente' },
      growing:   { color:'g', label:'🚀 Vue : ASINs en croissance', desc:'CA en hausse de plus de 20% vs semaine précédente' },
      'seg-a':   { color:'b', label:'🥇 Vue : Segment A — Top sellers', desc:'ASINs représentant 80% du CA total' },
      'seg-b':   { color:'b', label:'🥈 Vue : Segment B — Développement', desc:'ASINs représentant 15% du CA total' },
      'seg-c':   { color:'gr', label:'🥉 Vue : Segment C — Long tail', desc:'ASINs représentant 5% du CA total' },
    };
    if (asinView !== 'all' && viewMeta[asinView]) {
      const vm = viewMeta[asinView];
      h += '<div style="padding:10px 14px;background:var(--' + vm.color + '-bg);border:1px solid var(--' + vm.color + '-bd);border-radius:var(--rdl);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:12px">';
      h += '<div><div style="font-weight:600;font-size:13px;color:var(--' + vm.color + ')">' + vm.label + ' (' + (asinViewAsins?.length || 0) + ' ASINs)</div>';
      h += '<div style="font-size:11px;color:var(--tx3);margin-top:2px">' + vm.desc + '</div></div>';
      h += '<div style="display:flex;gap:6px">';
      h += '<button class="btn btn-sm" onclick="exportViewXlsx()">⬇ XLSX (' + (asinViewAsins?.length || 0) + ')</button>';
      h += '<button class="btn btn-sm" onclick="exportViewCsv()">⬇ CSV</button>';
      h += '</div></div>';
    }

    // ── Filtres enrichis ──────────────────────────────────────────
    // ── Barre de recherche ──
    h += `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--s1);border:2px solid ${asinSearch ? 'var(--or)' : 'var(--bd2)'};border-radius:var(--rdl);margin-bottom:14px;transition:border-color .2s;box-shadow:${asinSearch ? '0 0 0 3px var(--or-l)' : 'none'}">
      <button onclick="triggerSearch()" style="background:none;border:none;font-size:18px;cursor:pointer;flex-shrink:0;padding:0;line-height:1" title="Lancer la recherche">🔍</button>
      <input
        id="asin-search-input"
        type="text"
        value="${esc(asinSearch)}"
        placeholder="Rechercher par ASIN, SKU, EAN ou mot dans le titre... (Entrée pour valider)"
        onkeydown="if(event.key==='Enter'){triggerSearch()}"
        onfocus="this.closest('div').style.borderColor='var(--or)'"
        onblur="this.closest('div').style.borderColor=this.value?'var(--or)':'var(--bd2)'"
        style="flex:1;border:none;background:transparent;font-size:14px;color:var(--tx);outline:none;font-family:inherit"
      />
      ${asinSearch
        ? `<span style="font-size:11px;color:var(--or);font-weight:600;white-space:nowrap">${asins.length} résultat${asins.length>1?'s':''}</span>
           <button onclick="asinSearch='';document.getElementById('asin-search-input').value='';render()" style="background:var(--r-bg);border:1px solid var(--r-bd);color:var(--r);cursor:pointer;font-size:12px;padding:3px 8px;border-radius:20px;font-weight:600">✕ Effacer</button>`
        : `<span style="font-size:11px;color:var(--tx3)">ASIN · SKU · EAN · titre</span>`
      }
    </div>`;

    const asinSortOpts = [
      { v: 'ca_desc',    l: '💰 CA décroissant' },
      { v: 'ca_asc',     l: '💰 CA croissant' },
      { v: 'hausse',     l: '📈 Meilleures hausses' },
      { v: 'baisse',     l: '📉 Plus fortes baisses' },
      { v: 'stock_asc',  l: '📦 Stock critique en premier' },
      { v: 'health_asc', l: '🩺 Health Score bas en premier' },
      { v: 'gv_desc',    l: '👁 Glance Views décroissant' },
      { v: 'trend_asc',  l: '📉 Déclin structurel en premier' },
      { v: 'trend_desc', l: '📈 Croissance structurelle en premier' },
    ];
    const asinLimitOpts = [
      { v: 25,  l: 'Top 25' },
      { v: 50,  l: 'Top 50' },
      { v: 100, l: 'Top 100' },
      { v: 9999,l: 'Tous' },
    ];

    h += `<div class="filters" style="gap:12px">
      <div style="display:flex;align-items:center;gap:6px">
        <span class="filter-label">Trier par</span>
        <select class="filter-select" onchange="asinSort=this.value;render()">
          ${asinSortOpts.map(o => `<option value="${o.v}"${asinSort===o.v?' selected':''}>${o.l}</option>`).join('')}
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span class="filter-label">Afficher</span>
        <select class="filter-select" onchange="asinLimit=+this.value;render()">
          ${asinLimitOpts.map(o => `<option value="${o.v}"${asinLimit===o.v?' selected':''}>${o.l}</option>`).join('')}
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span class="filter-label">Segment</span>
        <select class="filter-select" onchange="setFilter('segment',this.value)">
          <option value="all">Tous</option>
          <option value="A"${filters.segment==='A'?' selected':''}>🥇 A</option>
          <option value="B"${filters.segment==='B'?' selected':''}>🥈 B</option>
          <option value="C"${filters.segment==='C'?' selected':''}>🥉 C</option>
        </select>
      </div>
      <span style="color:var(--tx3);font-size:11px;margin-left:auto">${withRevenue.length} ASINs avec CA / ${asins.length} total</span>
      <button class="btn btn-sm" onclick="exportAsinsCsv()">⬇ CSV</button><button class="btn btn-sm" onclick="exportAsinsXlsx()" style="margin-left:4px">⬇ XLSX</button>
    </div>`;

    // ── Tri ──────────────────────────────────────────────────────
    let sorted = [...withRevenue];
    if (asinSort === 'ca_desc')         sorted.sort((a,b) => (getRevenue(b,c)||0)-(getRevenue(a,c)||0));
    else if (asinSort === 'ca_asc')     sorted.sort((a,b) => (getRevenue(a,c)||0)-(getRevenue(b,c)||0));
    else if (asinSort === 'hausse')     sorted.sort((a,b) => parseNum(b.revenueDelta)-parseNum(a.revenueDelta));
    else if (asinSort === 'hausse_baisse_desc') sorted.sort((a,b) => parseNum(b.revenueDelta)-parseNum(a.revenueDelta));
    else if (asinSort === 'hausse_baisse_asc')  sorted.sort((a,b) => parseNum(a.revenueDelta)-parseNum(b.revenueDelta));
    else if (asinSort === 'baisse')     sorted.sort((a,b) => parseNum(a.revenueDelta)-parseNum(b.revenueDelta));
    else if (asinSort === 'stock_asc')  sorted.sort((a,b) => (a.sellableUnits||9999)-(b.sellableUnits||9999));
    else if (asinSort === 'stock_desc') sorted.sort((a,b) => (b.sellableUnits||9999)-(a.sellableUnits||9999));
    else if (asinSort === 'health_asc') sorted.sort((a,b) => calcHealth(a)-calcHealth(b));
    else if (asinSort === 'health_desc')sorted.sort((a,b) => calcHealth(b)-calcHealth(a));
    else if (asinSort === 'gv_desc')    sorted.sort((a,b) => (b.glanceViews||0)-(a.glanceViews||0));
    else if (asinSort === 'gv_asc')     sorted.sort((a,b) => (a.glanceViews||0)-(b.glanceViews||0));
    else if (asinSort === 'potential_desc') sorted.sort((a,b) => calcPotential(b,c).score-calcPotential(a,c).score);
    else if (asinSort === 'potential_asc')  sorted.sort((a,b) => calcPotential(a,c).score-calcPotential(b,c).score);
    else if (asinSort === 'ppm_desc')   sorted.sort((a,b) => ((c.ppmData||{})[b.asin]?.ppm||0)-((c.ppmData||{})[a.asin]?.ppm||0));
    else if (asinSort === 'ppm_asc')    sorted.sort((a,b) => ((c.ppmData||{})[a.asin]?.ppm||0)-((c.ppmData||{})[b.asin]?.ppm||0));
    else if (asinSort === 'trend_asc')  sorted.sort((a,b) => (calcTrend(a)?.slope||0)-(calcTrend(b)?.slope||0));
    else if (asinSort === 'trend_desc') sorted.sort((a,b) => (calcTrend(b)?.slope||0)-(calcTrend(a)?.slope||0));

    const visible = sorted.slice(0, asinLimit);

    // ── Tableau ──────────────────────────────────────────────────
    // Fonction helper pour en-tête triable
    const thSort = (label, sortKey, align='r') => {
      const isActive = asinSort === sortKey + '_desc' || asinSort === sortKey + '_asc';
      const isDesc = asinSort === sortKey + '_desc';
      const arrow = isActive ? (isDesc ? ' ▼' : ' ▲') : ' ⇅';
      const newSort = isActive && isDesc ? sortKey + '_asc' : sortKey + '_desc';
      return '<th class="' + align + '" style="cursor:pointer;user-select:none;white-space:nowrap;' + (isActive ? 'color:var(--accent)' : '') + '" onclick="asinSort=\'' + newSort + '\';render()">' + label + '<span style="font-size:9px;opacity:.6">' + arrow + '</span></th>';
    };

    h += `<div class="tbl-wrap"><table class="tbl"><thead><tr>
      <th style="width:28px;text-align:center">#</th>
      <th style="width:36px">Score</th>
      <th>Produit / ASIN</th>
      <th style="width:44px">Seg.</th>
      ${thSort('CA', 'ca')}
      ${thSort('Δ CA', 'hausse_baisse')}
      <th>Tendance</th>
      ${thSort('GV', 'gv')}
      <th class="r">Δ GV</th>
      ${thSort('Stock', 'stock')}
      <th class="r">Retail%</th>
      ${thSort('🚀', 'potential')}
      ${thSort('PPM', 'ppm')}
      <th></th>
    </tr></thead><tbody>`;

    visible.forEach(a => {
      const health = calcHealth(a);
      const seg = calcSegment(a, totalCA, c);
      const delta = parseNum(a.revenueDelta);
      const isLow = a.sellableUnits >= 0 && a.sellableUnits < 30 && (getRevenue(a,c)||0) > 50;
      const isDec = delta < -10;
      const rc = isDec ? 'al-row' : isLow ? 'warn-row' : '';
      const rank = visible.indexOf(a) + 1;
      h += `<tr class="${rc}" style="cursor:pointer" onclick="selectAsin('${esc(a.asin)}')">
        <td style="text-align:center;font-size:11px;font-weight:700;color:var(--tx3)">${rank}</td>
        <td><div class="hs hs-sm ${healthClass(health)}">${health}</div></td>
        <td>
          <div style="font-weight:500;font-size:12px;max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${esc(a.title)}">${esc(shortName(a))}</div>
          <div style="font-size:10px;color:var(--tx3);font-family:var(--fm)">${a.asin} <span style="margin-left:4px;opacity:.6">${a.market||'.fr'}</span>${a.sourcingOnly ? '<span style="margin-left:4px;font-size:9px;font-weight:700;color:var(--a);background:var(--a-bg);border-radius:3px;padding:1px 4px">Appro</span>' : ''}</div>
        </td>
        <td>${segBadge(seg)}</td>
        <td class="r" style="font-weight:600">${fmtEur(getRevenue(a,c)||0)}</td>
        <td class="r">${deltaBadge(a.revenueDelta)}</td>
        <td>
          <div style="display:flex;align-items:center;gap:6px">
            ${(() => { const t = calcTrend(a); return sparkline(t?.series, t?.cls) + trendBadge(t); })()}
          </div>
        </td>
        <td class="r">${fmt(a.glanceViews||0)}</td>
        <td class="r">${deltaBadge(a.gvDelta)}</td>
        <td class="r ${isLow?'':''}">
          ${a.sellableUnits != null ? `<span style="font-weight:600;color:${isLow?'var(--r)':'inherit'}">${fmt(a.sellableUnits)}u</span>` : '—'}
        </td>
        <td class="r">${a.retailPct||'—'}</td>
        <td class="r">${(() => { const p = calcPotential(a,c); return p.score >= 45 ? '<span style="font-size:11px;font-weight:700;color:' + (p.score>=70?'var(--g)':'var(--a)') + '">' + p.score + '</span>' : '<span style="color:var(--tx3);font-size:10px">—</span>'; })()}</td>
        <td class="r">${(() => { const pm = (c.ppmData||{})[a.asin]; return pm?.ppm != null ? '<span style="font-size:11px;font-weight:600;color:' + (pm.ppm>=15?'var(--g)':pm.ppm<5?'var(--r)':'var(--a)') + '">' + pm.ppm.toFixed(1) + '%</span>' : '<span style="color:var(--tx3);font-size:10px">—</span>'; })()}</td>
        <td style="white-space:nowrap">
          <button class="btn btn-xs btn-amazon" onclick="event.stopPropagation();openAmazonProduct('${esc(a.asin)}','${a.market||'.fr'}')" title="Amazon">🔗</button>
        </td>
      </tr>`;
    });
    h += `</tbody></table></div>`;
    if (sorted.length > asinLimit) h += `<p style="font-size:10px;color:var(--tx3);margin-top:8px;padding:0 4px">${asinLimit} affichés sur ${sorted.length} — changez le filtre "Afficher" pour voir plus</p>`;
  } else {
    const a = asins.find(x => x.asin === selectedAsin);
    if (!a) { selectedAsin = null; return renderAsins(); }
    const health = calcHealthDeep(a, c);
    const deep = calcTrendDeep(a, c);
    const seg = calcSegment(a, totalCA, c);
    const keyword = getMainKeyword(a);

    h += `<button class="btn btn-sm" onclick="selectedAsin=null;render()" style="margin-bottom:14px">← Retour</button>`;

    h += `<div class="cd" style="display:flex;gap:18px;align-items:flex-start">`;
    h += `<div class="hs hs-lg ${healthClass(health)}">${health}</div>`;
    h += `<div style="flex:1">
      <h2 style="font-size:15px;margin-bottom:6px">${esc(shortName(a))}</h2>
      <div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:6px">
        <span class="mono" style="font-size:10px;color:var(--tx3)">${a.asin}</span>
        ${segBadge(seg)}
        <span class="pill pill-gr">${a.market||'.fr'}</span>${a.sourcingOnly ? '<span class="pill" style="background:var(--a-bg);color:var(--a);border:1px solid var(--a-bd)">Approvisionnement</span>' : ''}
        ${a.brand ? `<span class="pill pill-b">${esc(a.brand)}</span>` : ''}
      </div>
      <p style="font-size:11px;color:var(--tx3);max-width:500px">${esc(a.title||'')}</p>
    </div>`;
    h += `<div style="display:flex;flex-direction:column;gap:6px">
      <button class="btn btn-amazon btn-sm" onclick="openAmazonProduct('${esc(a.asin)}','${a.market||'.fr'}')">🔗 Amazon</button>
      <button class="btn btn-purple btn-sm" onclick="openAmazonSearch('${esc(keyword)}','${a.market||'.fr'}')">🔍 Concurrence</button>
      <button class="btn btn-b btn-sm" onclick="launchChromeAnalysis('${esc(a.asin)}','${a.market||'.fr'}')">🌐 Chrome</button>
      <button class="btn btn-sm" onclick="activeCaseType=null;renderCaseModal('${esc(a.asin)}')" style="border-color:var(--or-border);color:var(--or)">📋 Cas Vendor</button>
    </div>`;
    h += `</div>`;

    // ── Bandeau tendance structurelle narratif ──
    {
      const sigColors = {
        'trend-up':'var(--g)', 'trend-up-soft':'#65A30D',
        'trend-down':'var(--r)', 'trend-down-soft':'var(--a)', 'trend-stable':'var(--tx3)'
      };
      const sigColor = sigColors[deep.signalCls] || 'var(--tx2)';
      const hasDeeep = deep.ca1 || deep.ca2 || deep.caYTD;

      h += `<div style="background:var(--s2);border:1px solid var(--bd);border-radius:var(--rdl);padding:14px 16px;margin-bottom:12px">`;
      h += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:${hasDeeep?'10':'0'}px;flex-wrap:wrap">`;
      h += `<span style="font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px">Tendance structurelle</span>`;
      h += trendBadge(deep.shortTrend);
      if (deep.signal && deep.signal !== 'Données insuffisantes') {
        h += `<span style="font-size:12px;font-weight:700;color:${sigColor}">⚡ ${deep.signal}</span>`;
      } else if (!deep.shortTrend) {
        h += `<span style="font-size:11px;color:var(--tx3)">— Importez plusieurs semaines pour voir la tendance hebdo</span>`;
      }
      h += `</div>`;

      if (hasDeeep) {
        // Tableau comparatif clair N-2 / N-1 / YTD / Semaine actuelle
        h += `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px">`;

        if (deep.ca2) {
          const d2to1 = deep.ca1 ? ((deep.ca1-deep.ca2)/deep.ca2*100).toFixed(0) : null;
          h += `<div style="background:var(--s1);border:1px solid var(--bd);border-radius:var(--rd);padding:10px 12px;text-align:center">
            <div style="font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;margin-bottom:4px">${deep.prev2Year}</div>
            <div style="font-size:15px;font-weight:700">${fmtEur(deep.ca2)}</div>
            <div style="font-size:10px;color:var(--tx3);margin-top:2px">Annuel complet</div>
          </div>`;
        }
        if (deep.ca1) {
          const d2to1 = deep.ca2 ? ((deep.ca1-deep.ca2)/deep.ca2*100).toFixed(0) : null;
          const dColor = d2to1 ? (parseFloat(d2to1)>=0?'var(--g)':'var(--r)') : 'var(--tx3)';
          h += `<div style="background:var(--s1);border:1px solid var(--bd);border-radius:var(--rd);padding:10px 12px;text-align:center">
            <div style="font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;margin-bottom:4px">${deep.prevYear}</div>
            <div style="font-size:15px;font-weight:700">${fmtEur(deep.ca1)}</div>
            <div style="font-size:10px;color:${dColor};margin-top:2px">${d2to1 ? (parseFloat(d2to1)>=0?'▲ +':'▼ ')+d2to1+'% vs '+deep.prev2Year : 'Annuel complet'}</div>
          </div>`;
        }
        if (deep.caYTD) {
          const ytdEnd = c.ytdData?.ventes?.periodEnd || '';
          const ytdLabel = ytdEnd ? '01/01→' + ytdEnd.slice(0,5) : 'YTD ' + deep.curYear;
          const dColor = deep.ytdVsN1 !== null ? (deep.ytdVsN1>=0?'var(--g)':'var(--r)') : 'var(--tx3)';
          h += `<div style="background:var(--or-l);border:1px solid var(--or-border);border-radius:var(--rd);padding:10px 12px;text-align:center">
            <div style="font-size:10px;font-weight:600;color:var(--or);text-transform:uppercase;margin-bottom:4px">${ytdLabel}</div>
            <div style="font-size:15px;font-weight:700">${fmtEur(deep.caYTD)}</div>
            <div style="font-size:10px;color:${dColor};margin-top:2px">${deep.ytdVsN1 !== null ? (deep.ytdVsN1>=0?'▲ +':'▼ ')+Math.abs(deep.ytdVsN1).toFixed(1)+'% vs même période '+deep.prevYear : 'vs N-1 non calculable'}</div>
          </div>`;
        }
        // Semaine actuelle pour comparaison
        if (getRevenue(a,c) && a.periodEnd) {
          h += `<div style="background:var(--b-bg);border:1px solid var(--b-bd);border-radius:var(--rd);padding:10px 12px;text-align:center">
            <div style="font-size:10px;font-weight:600;color:var(--b);text-transform:uppercase;margin-bottom:4px">Semaine ${a.periodEnd.slice(0,5)}</div>
            <div style="font-size:15px;font-weight:700">${fmtEur(getRevenue(a,c))}</div>
            <div style="font-size:10px;color:var(--tx3);margin-top:2px">${a.periodStart ? a.periodStart.slice(0,5)+'→'+a.periodEnd.slice(0,5) : 'Période courante'}</div>
          </div>`;
        }
        h += `</div>`;

        if (!deep.shortTrend) {
          h += `<div style="margin-top:8px;font-size:10px;color:var(--tx3)">💡 Importez plusieurs semaines successives pour voir la tendance hebdo se construire.</div>`;
        }
      } else {
        h += `<div style="font-size:11px;color:var(--tx3);margin-top:4px">Chargez les données annuelles (N-2, N-1, YTD) depuis <button onclick="go('import')" style="background:none;border:none;color:var(--or);cursor:pointer;font-size:11px;font-weight:600;padding:0;text-decoration:underline">Import données</button> pour voir la trajectoire longue.</div>`;
      }
      h += `</div>`;
    }

    // Période de l'import courant
    const periodLabel = a.periodStart && a.periodEnd
      ? a.periodStart + ' → ' + a.periodEnd
      : a.periodEnd || 'Période inconnue';
    const periodBadge = `<div style="font-size:10px;color:var(--or);font-weight:600;margin-top:3px">${periodLabel}</div>`;

    h += `<div class="kpi-g">`;

function renderPompier() {
  const c = cl();
  if (!c) return renderWelcome();
  if (!c.asins?.length) return `<div class="alr alr-a">Importez d'abord des données pour lancer le diagnostic.</div>`;

  const totalCA = asins.reduce((s, a) => s + (getRevenue(a,c)||0), 0);

  const threshold = pompierThreshold;

    .sort((a, b) => parseNum(a.revenueDelta) - parseNum(b.revenueDelta));

  const totalLost = declining.reduce((s,a) => s + Math.abs(parseNum(a.revenueDelta)/100*(getRevenue(a,c)||0)), 0);

  const pompPeriodImport = c.imports?.filter(i=>i.periodType==='weekly'||!i.periodType).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  const pompPeriodLabel = pompPeriodImport ? pompPeriodImport.periodStart + ' → ' + pompPeriodImport.periodEnd : null;

  let h = '';

  // ── Header avec stats clés ──
  h += `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
    <div>
      <h2 style="font-size:17px;font-weight:700">🚨 Diagnostic CA — ASINs en baisse</h2>

    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="filter-label">Seuil de baisse</span>
      <select class="filter-select" onchange="pompierThreshold=+this.value;render()">
        <option value="5"${threshold===5?' selected':''}>› 5%</option>
        <option value="10"${threshold===10?' selected':''}>› 10%</option>
        <option value="20"${threshold===20?' selected':''}>› 20%</option>

        <option value="50"${threshold===50?' selected':''}>› 50%</option>
      </select>

    return h;
  }

  </div>`;

  // ── Tri Diagnostic CA ──
  let pompierSort = typeof window._pompierSort !== 'undefined' ? window._pompierSort : 'delta_asc';
  const thP = (label, key, align='r') => {
    const isA = pompierSort === key + '_desc' || pompierSort === key + '_asc';

  // ── Tableau ──
  h += `<div class="tbl-wrap"><table class="tbl"><thead><tr>
    <th style="width:36px">Score</th>

    <th style="width:44px">Seg.</th>

  decliningSorted.forEach(a => {
    const health = calcHealth(a);

    const delta = parseNum(a.revenueDelta);

    const isNoStock = (a.sellableUnits || 0) === 0;
    const trend = calcTrend(a);
    // Indiquer explicitement si croissance structurelle malgré baisse hebdo

      </td>
      <td>${segBadge(seg)}</td>
      <td class="r" style="font-weight:600">${fmtEur(getRevenue(a,c)||0)}</td>
      <td class="r"><span style="font-weight:700;color:var(--r)">▼ ${a.revenueDelta||'?'}</span></td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          ${sparkline(trend?.series, trend?.cls) + trendBadge(trend)}

      <td class="r">${a.retailPct||'—'}</td>

        <button class="btn btn-xs btn-amazon" onclick="event.stopPropagation();openAmazonProduct('${esc(a.asin)}','${a.market||'.fr'}')" title="Amazon">🔗</button>

  });
  h += `</tbody></table></div>`;

  // ── Résultat IA ──
  if (aiResult) {
    h += `<div class="cd" style="margin-top:14px"><div class="cd-t space"><span>🤖 Analyse IA</span><button class="btn btn-sm" onclick="copyAI()">📋 Copier</button></div>`;
    h += `<div class="ai-out">${renderMarkdown(aiResult)}</div></div>`;

  return h;
