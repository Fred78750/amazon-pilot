  --tx: #F0F0F8;

  --s3: #EEF0F4;
  --s4: #E4E7EC;
  --bd: rgba(0,0,0,0.07);

}

.sb-it:hover { background: var(--s3); color: var(--tx); }

.sb-cl:hover { background: var(--s3); color: var(--tx); }

.btn-b { background: var(--b-bg); color: var(--b); border-color: var(--b-bd); }
.btn-purple { background: var(--p-bg); color: var(--p); border-color: var(--p-bd); }

.btn-sm { padding: 4px 9px; font-size: 11px; }
.btn-xs { padding: 3px 7px; font-size: 10px; }


.pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; line-height: 1.5; }
.pill-g { background: var(--g-bg); color: var(--g); }
.pill-r { background: var(--r-bg); color: var(--r); }

.alr { padding: 12px 16px; border-radius: var(--rdl); display: flex; align-items: flex-start; gap: 10px; margin-bottom: 14px; font-size: 12px; line-height: 1.6; border: 1px solid; }
.alr-b { background: var(--b-bg); border-color: var(--b-bd); color: var(--b); }
.alr-a { background: var(--a-bg); border-color: var(--a-bd); color: var(--a); }
.alr-g { background: var(--g-bg); border-color: var(--g-bd); color: var(--g); }
.alr-r { background: var(--r-bg); border-color: var(--r-bd); color: var(--r); }

.cd { background: var(--s1); border-radius: var(--rdl); border: 1px solid var(--bd); padding: 18px; margin-bottom: 14px; box-shadow: var(--sh); }
.cd-t { font-size: 13px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; color: var(--tx); }

.kpi-g { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-bottom: 14px; }

.kpi:hover { border-color: var(--bd2); }
.kpi.al { border-left: 3px solid var(--r); }
.kpi.warn { border-left: 3px solid var(--a); }
.kpi.good { border-left: 3px solid var(--g); }
.kpi-lb { font-size: 10px; color: var(--tx3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .5px; font-weight: 500; }

.kpi-d { font-size: 11px; margin-top: 5px; font-weight: 500; display: flex; align-items: center; gap: 3px; }
.kpi-d.up { color: var(--g); }
.kpi-d.down { color: var(--r); }


.hs { display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: 700; }
.hs.critical { background: var(--r-bg); color: var(--r); border: 1px solid var(--r-bd); }
.hs.warning  { background: var(--a-bg); color: var(--a); border: 1px solid var(--a-bd); }
.hs.good     { background: var(--g-bg); color: var(--g); border: 1px solid var(--g-bd); }
.hs.excellent { background: var(--b-bg); color: var(--b); border: 1px solid var(--b-bd); }

.tbl-wrap { overflow-x: auto; border-radius: var(--rd); border: 1px solid var(--bd); }
#appros-tbl-wrap { overflow-x: auto; overflow-y: auto; max-height: 68vh; }

#appros-tbl-wrap td:nth-child(1) { position: sticky; left: 0; z-index: 2; background: var(--s1); min-width:110px; max-width:110px; }
#appros-tbl-wrap th:nth-child(2),
#appros-tbl-wrap td:nth-child(2) { position: sticky; left: 110px; z-index: 2; background: var(--s1); min-width:190px; max-width:190px; }
#appros-tbl-wrap thead th:nth-child(1),
#appros-tbl-wrap thead th:nth-child(2) { z-index: 4; }

#appros-tbl-wrap td:nth-child(2),
#appros-tbl-wrap th:nth-child(2) { border-right: 2px solid var(--bd2); }

#appros-tbl-wrap tr:hover td:nth-child(1),
#appros-tbl-wrap tr:hover td:nth-child(2) { background: var(--s2); }

#appros-tbl-wrap::-webkit-scrollbar-track { background: var(--s2); border-radius: 4px; }
#appros-tbl-wrap::-webkit-scrollbar-thumb { background: var(--tx3); border-radius: 4px; }

.tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
.tbl th { text-align: left; padding: 9px 12px; font-weight: 600; color: var(--tx3); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--bd2); background: var(--s2); white-space: nowrap; position: sticky; top: 0; z-index: 1; }
.tbl td { padding: 10px 12px; border-bottom: 1px solid var(--bd); vertical-align: middle; }
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: var(--s2); }
.tbl .al-row td { background: rgba(239,68,68,0.05); }
.tbl .warn-row td { background: rgba(245,158,11,0.05); }

.fg { display: flex; flex-direction: column; gap: 4px; }

.fg-in { padding: 8px 11px; border-radius: var(--rd); border: 1px solid var(--bd2); font-size: 13px; color: var(--tx); background: var(--s2); transition: border .15s, box-shadow .15s; width: 100%; }

.fg2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }


.wz-bar { display: flex; margin-bottom: 20px; background: var(--s2); border: 1px solid var(--bd); border-radius: var(--rdl); overflow: hidden; }
.wz-s { flex: 1; padding: 12px 10px; display: flex; align-items: center; gap: 9px; cursor: pointer; border-right: 1px solid var(--bd); transition: background .15s; }

.wz-s.on { background: var(--or-l); }

.tog { display: flex; gap: 6px; margin-top: 5px; }
.tog-b { flex: 1; padding: 8px 10px; border-radius: var(--rd); border: 1px solid var(--bd2); background: var(--s2); cursor: pointer; font-size: 12px; font-weight: 600; color: var(--tx2); text-align: center; transition: all .15s; }
.tog-b:hover { border-color: var(--bd3); }

.filters { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding: 10px 14px; background: var(--s1); border: 1px solid var(--bd); border-radius: var(--rdl); flex-wrap: wrap; box-shadow: var(--sh); }

.rec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

function log(msg, type = '') {
  const ts = new Date().toLocaleTimeString('fr-FR');
  debugLog.push({ ts, msg, type });
  if (debugLog.length > 80) debugLog.shift();
  console.log(`[${ts}] ${msg}`);
}
let apiKey = '';
let _db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    if (_db) return resolve(_db);
    const req = indexedDB.open('AmazonPilot', 2);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('clients')) {
        db.createObjectStore('clients', { keyPath: 'id' });
      }
      if (!db.objectStoreNames.contains('meta')) {
        db.createObjectStore('meta');
      }
    };
    req.onsuccess = e => { _db = e.target.result; resolve(_db); };
    req.onerror = () => reject(req.error);
  });
}

async function save() {
  try {
    const db = await openDB();
    const tx = db.transaction('clients', 'readwrite');
    const store = tx.objectStore('clients');
    // Vider et réécrire tous les clients
    await new Promise(r => { store.clear().onsuccess = r; });
    for (const c of clients) {
      store.put({ ...c, imports: (c.imports||[]).slice(-50) });
    }
    await new Promise((res, rej) => {
      tx.oncomplete = res;
      tx.onerror = () => rej(tx.error);
    });
    // Calcul taille estimée pour info
    const json = JSON.stringify(clients);
    const kb = Math.round(json.length / 1024);
    if (kb > 500) log(`💾 Sauvegardé — ${kb} KB (IndexedDB)`, 'ok');
  } catch(e) {
    log('Save error: ' + e.message, 'err');
    // Fallback localStorage (limité mais mieux que rien)
    try {
      const slim = clients.map(c => ({ ...c, asins: (c.asins||[]).slice(0,200).map(a => ({...a,history:a.history?.slice(-8)||[],historyMonthly:a.historyMonthly?.slice(-6)||[]})), imports:(c.imports||[]).slice(-5) }));
      localStorage.setItem('ap-v31-fallback', JSON.stringify(slim));
      log('⚠ Fallback localStorage (200 ASINs max)', 'warn');
    } catch(e2) { log('Save fatal: ' + e2.message, 'err'); }
  }
}

function saveApiKey(key) {
  apiKey = key;
  localStorage.setItem('ap-api-key', key);
  log('✓ Clé API sauvegardée', 'ok');
}

async function load() {
  try {
    const db = await openDB();
    const tx = db.transaction('clients', 'readonly');
    const store = tx.objectStore('clients');
    const data = await new Promise((res, rej) => {
      const req = store.getAll();
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    });

    if (data && data.length) {
      // Merger avec freshClient() pour garantir la présence de tous les champs
      clients = data.map(c => ({ ...freshClient(), ...c,
        weeklyActions:  c.weeklyActions  || [],
        monthlyActions: c.monthlyActions || [],
        awayUntil:      c.awayUntil      || null,
        leadTime:       c.leadTime       ?? 20,
        stockTarget:    c.stockTarget    ?? 8,
        moq:            c.moq            ?? 0,
        catalogue:      c.catalogue      || [],
        pos:            c.pos            || [],
        ficheOptimisee: c.ficheOptimisee || {},
        ppmData:        c.ppmData        || {},
        forecastData:   c.forecastData   || {}
      }));
      activeId = clients[0].id;
      screen = 'dashboard';
      log(`✓ IndexedDB: ${clients.length} client(s), ${clients.reduce((s,c)=>s+(c.asins?.length||0),0)} ASINs`, 'ok');
    } else {
      // Migration depuis localStorage v3.1 ou v3.0
      const lsNew = localStorage.getItem('ap-v31');
      const lsOld = localStorage.getItem('ap-clients-v30');
      const raw = lsNew || lsOld;
      if (raw) {
        try {
          let d = JSON.parse(raw);
          d = d.map(c => ({ ...freshClient(), ...c,
            history: c.history || { weekly:[], monthly:[], yearly:[] },
            weeklyActions: c.weeklyActions || [],
            monthlyActions: c.monthlyActions || [],
            awayUntil: c.awayUntil || null
          }));
          clients = d;
          activeId = d[0]?.id || null;
          screen = d.length ? 'dashboard' : 'welcome';
          await save(); // migrer vers IndexedDB
          localStorage.removeItem('ap-v31');
          localStorage.removeItem('ap-clients-v30');
          log(`✓ Migration localStorage → IndexedDB: ${d.length} client(s)`, 'ok');
        } catch(e) { log('Migration error: ' + e.message, 'err'); }
      }
    }
    apiKey = localStorage.getItem('ap-api-key') || '';
    const theme = localStorage.getItem('ap-theme') || 'light';
    document.documentElement.setAttribute('data-theme', theme);
    updateThemeIcon(theme);
  } catch(e) {
    log('Load error: ' + e.message + ' — Tentative localStorage', 'err');
    // Fallback total localStorage
    try {
      const raw = localStorage.getItem('ap-v31') || localStorage.getItem('ap-v31-fallback');
      if (raw) { clients = JSON.parse(raw); activeId = clients[0]?.id; screen = 'dashboard'; }
    } catch(e2) {}
    apiKey = localStorage.getItem('ap-api-key') || '';
  }
}

  if (el) el.textContent = theme === 'dark' ? '☀️' : '🌙';

function norm(s) {
  return (s || '').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[''\u0027\u0060\u00B4]/g, "'")
    .replace(/[\u2013—\u2212]/g, '-')
    .replace(/[\u00a0\u202f\u2009]/g, ' ')
    .trim();
}

function findCol(row, ...keywords) {
  const keys = Object.keys(row);
  for (const kw of keywords) {
    const kwN = norm(kw);
    for (const key of keys) {
      if (norm(key).includes(kwN)) return row[key];
    }
  }
  return null;
}

function parseNum(val) {
  if (val == null || val === '') return 0;
  let s = String(val).replace(/[€$£%]/g, '').replace(/[\s\u00a0\u202f\u2009]+/g, '');
  if (s.includes(',') && !s.includes('.')) s = s.replace(',', '.');
  else if (s.includes(',') && s.includes('.')) s = s.replace(/,/g, '');
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}

function parseMetadata(line) {
  const meta = {};
  const matches = line.matchAll(/([^,=\[\]]+)=\[([^\]]*)\]/g);
  for (const m of matches) meta[norm(m[1])] = m[2].trim();
  return meta;
}

function detectFileType(headers) {
  const h = headers.map(x => norm(x)).join(' ');
  if ((h.includes('chiffre') && h.includes('affaires')) || h.includes('ordered revenue') || h.includes('revenus')) return 'ventes';
  if (h.includes('vues') || h.includes('glance') || h.includes('offre vedette')) return 'trafic';
  if (h.includes('stock') || h.includes('rupture') || h.includes('vendable') || h.includes('invendable')) return 'stock';
  return 'unknown';
}

function detectPeriodType(startDate, endDate, intervalMeta) {
  // Lire d'abord l'intervalle explicite dans les métadonnées VC
  if (intervalMeta) {
    const iv = norm(intervalMeta).trim(); // norm() pour neutraliser les accents
    if (iv.includes('annee en cours') || iv.includes('year to date') || iv.includes('ytd')) return 'ytd';
    if (iv === 'an' || iv === 'year' || iv === 'annual' || iv.includes('chaque annee') || iv.includes('chaque an')) return 'annual';
    if (iv.includes('semaine') || iv === 'week' || iv.includes('weekly')) return 'weekly';
    if (iv.includes('mois') || iv === 'month' || iv.includes('monthly')) return 'monthly';
  }
  // Fallback sur le nombre de jours
  if (!startDate || !endDate) return 'weekly';
  const pd = s => { const [d,m,y] = s.split('/').map(Number); return new Date(y,m-1,d); };
  const days = Math.round((pd(endDate) - pd(startDate)) / 86400000);
  if (days <= 14) return 'weekly';
  if (days <= 45) return 'monthly';
  if (days >= 300 && days <= 366) return 'annual';
  if (days > 60 && days < 300) return 'ytd';
  return 'yearly'; // legacy
}

function parseCSVFile(text, filename) {
  const lines = text.split('\n');
  if (lines.length < 2) return { error: 'Fichier vide ou invalide' };
  const meta = parseMetadata(lines[0]);
  const market = MARKET_CODES[meta.pays] || '.fr';
  // Détecter la vue distributeur : Fabrication (manufacturing) vs Approvisionnement (sourcing)
  const apercu = (meta['apercu du distributeur.'] || meta['apercu du distributeur'] || '').toLowerCase();
  const distributorView = apercu.includes('approvisionnement') ? 'appro' : 'fab';
  log(`Metadata: Pays=${meta.pays || '?'}, ${meta.entreprises || ''}, Vue=${distributorView}`);
  let periodStart = null, periodEnd = null;

  // 1. Essayer d'abord le nom du fichier — source la plus fiable
  // Format Amazon : Datedefin_DD-MM-YYYY_DD-MM-YYYY
  if (filename) {
    const fn = filename.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    const fdm = fn.match(/[Dd]atedefin[_\s]+(\d{2}-\d{2}-\d{4})[_\s]+(\d{2}-\d{2}-\d{4})/i);
    if (fdm) {
      periodStart = fdm[1].replace(/-/g, '/');
      periodEnd   = fdm[2].replace(/-/g, '/');
      log('Dates extraites du filename (Datedefin) : ' + periodStart + ' → ' + periodEnd, 'ok');
    } else {
      // Fallback : pattern DD-MM-YYYY_DD-MM-YYYY sans préfixe (ex: Chaqueannee_01-01-2024_31-12-2024)
      const fdm2 = fn.match(/(\d{2}-\d{2}-\d{4})[_\s]+(\d{2}-\d{2}-\d{4})/);
      if (fdm2) {
        periodStart = fdm2[1].replace(/-/g, '/');
        periodEnd   = fdm2[2].replace(/-/g, '/');
        log('Dates extraites du filename (brut) : ' + periodStart + ' → ' + periodEnd, 'ok');
      }
    }
  }

  // 2. Fallback sur les métadonnées du CSV si pas de dates dans le filename
  if (!periodEnd) {
    const ps = meta['champ de vision.'] || meta['champ de vision'] || '';
    const pm = ps.match(/(\d{2}\/\d{2}\/\d{4})\s*-\s*(\d{2}\/\d{2}\/\d{4})/);
    if (pm) { periodStart = pm[1]; periodEnd = pm[2]; }
  }
  const intervalMeta = meta['intervalle des rapports'] || meta['intervalle'] || '';
  const periodType = detectPeriodType(periodStart, periodEnd, intervalMeta);
  // Détection du format CSV "doublement encapsulé" des exports multi-pays VC
  // Ce format encapsule chaque ligne dans des guillemets externes avec "," comme séparateur
  // Exemple : "ASIN,""Nom du produit"",Marque,""Code de la boutique"",..."
  // (vs format standard mono-pays : ASIN;Nom du produit;Marque;...)
  const rawLines = lines.slice(1);
  const headerLine = rawLines[0] ? rawLines[0].trim() : '';
  const isEncapsulated = headerLine.startsWith('"ASIN,') || headerLine.startsWith('"asin,');
  let csvText, papaConfig;
  if (isEncapsulated) {
    // Désencapsuler : enlever les guillemets externes et dédoubler les "" internes
    const unescaped = rawLines
      .filter(l => l.trim())
      .map(l => {
        let s = l.trim();
        if (s.startsWith('"')) s = s.slice(1);           // guillemet initial
        s = s.replace(/"[;]*$/, '');                      // guillemet final + éventuels ";;;;"
        s = s.replace(/""/g, '"');                        // "" → "
        return s;
      })
      .join('\n');
    csvText = unescaped;
    papaConfig = { header: true, skipEmptyLines: true, delimiter: ',' };
    log(`📋 Format multi-pays détecté → désencapsulation activée`, 'ok');
  } else {
    csvText = rawLines.join('\n');
    papaConfig = { header: true, skipEmptyLines: true };
  }
  const res = Papa.parse(csvText, papaConfig);
  if (!res.data.length) return { error: 'Aucune donnée' };
  const headers = res.meta.fields || [];
  const fileType = detectFileType(headers);
  log(`📁 ${filename.slice(0,35)}... → ${fileType}, ${res.data.length} lignes, ${periodType}`, fileType === 'unknown' ? 'warn' : 'ok');
  const data = [];
  for (const row of res.data) {
    const asin = row['ASIN'] || findCol(row, 'asin') || '';
    if (!asin || asin.length < 5) continue;
    // Pour les CSV multi-boutiques (Gers Équipement) : lire le marché par ligne depuis "Code de la boutique"
    const boutiqueCode = findCol(row, 'code de la boutique', 'store_id', 'marketplace_id') || '';
    const itemMarket = BOUTIQUE_CODES[boutiqueCode.trim()] || market;
    const item = { asin, title: findCol(row, 'nom du produit', 'product title') || '', brand: findCol(row, 'marque', 'brand') || '', market: itemMarket, periodStart, periodEnd, periodType, distributorView };
    if (fileType === 'ventes') {
      item.revenue = parseNum(findCol(row, 'chiffre', 'ordered revenue'));
      item.revenueDelta = findCol(row, 'periode anterieure') || '';
      item.revenueYoY = findCol(row, "l'annee derniere", 'annee derniere') || '';
      item.units = parseNum(findCol(row, 'unites commandees', 'ordered units', 'commandees'));
      item.unitsDelta = findCol(row, 'unites commandees - periode') || '';
      item.shippedRevenue = parseNum(findCol(row, 'expeditions', 'shipped'));
      item.shippedUnits = parseNum(findCol(row, 'unites expediees'));
      item.returns = parseNum(findCol(row, 'retours client', 'retours'));
    }
    if (fileType === 'trafic') {
      item.glanceViews = parseNum(findCol(row, 'vues', 'glance views', 'offre vedette'));
      item.gvDelta = findCol(row, 'vues de la page de l', 'periode anterieure') || '';
      item.gvYoY = findCol(row, 'vues', "l'annee derniere") || '';
    }
    if (fileType === 'stock') {
      item.oosPct = findCol(row, 'rupture', 'approvisionnement possible') || '';
      item.sellableStock = parseNum(findCol(row, 'stock disponible a la vente', 'stock vendable'));
      item.sellableUnits = parseNum(findCol(row, 'vendables en stock', 'unites vendables en stock'));
      item.unsellableUnits = parseNum(findCol(row, 'unites invendables'));
      item.unhealthyStock = parseNum(findCol(row, 'stock malsain'));
      item.unhealthyUnits = parseNum(findCol(row, 'unites malsaines'));
      item.openPOQty = parseNum(findCol(row, 'bons de commande', 'quantite de bons'));
      item.retailPct = findCol(row, 'vente au detail', '% de vente') || '';
      item.confirmPct = findCol(row, 'confirmation fournisseur', '% de confirmation') || '';
    }
    data.push(item);
  }
  log(`✓ ${data.length} ASINs parsés (${fileType})`, 'ok');
  return { type: fileType, market, distributorView, periodStart, periodEnd, periodType, company: meta.entreprises || '', rowCount: data.length, data, filename };
}

function mergeImportData(client, parsedFiles) {
  if (!client.annualData) client.annualData = {};
  if (!client.ytdData) client.ytdData = {};

  const asinMap = new Map();
  // Clé composite asin|market pour supporter le multi-marchés (Gers Équipement)
  for (const a of client.asins) asinMap.set(a.asin + '|' + (a.market || '.fr'), { ...a, history: a.history || [] });
  let periodType = 'weekly', periodLabel = '';
  let totalCA = 0, totalUnits = 0, totalGV = 0;

  for (const file of parsedFiles) {
    if (!file || file.error) continue;
    periodType = file.periodType || 'weekly';
    periodLabel = file.periodEnd || new Date().toISOString().slice(0, 10);

    // ── Routing selon le type de période ──────────────────────
    if (periodType === 'annual') {
      const year = file.periodEnd ? file.periodEnd.split('/')[2] : new Date().getFullYear().toString();
      if (!client.annualData[year]) client.annualData[year] = {};
      const fileDistViewAnn = file.distributorView || 'fab';
      // Fusion Fab/Appro pour les données annuelles
      if (fileDistViewAnn === 'appro' && file.type === 'ventes') {
        // Appro annuel : additionner les ASINs fabricant absents de la vue Fab
        const existingFab = client.annualData[year]['ventes'];
        const fabASINs = existingFab ? existingFab.asins || {} : {};
        let approExtra = 0, approExtraUnits = 0, approCount = 0;
        for (const row of file.data) {
          if (!row.asin) continue;
          const brand = norm(row.brand || '');
          const isFab = clientFabBrands.size === 0 || clientFabBrands.has(brand);
          if (!fabASINs[row.asin] && isFab) {
            // ASIN absent de Fab mais marque fabricant → à additionner
            if (existingFab) existingFab.asins[row.asin] = { ...row, sourcingOnly: true };
            approExtra += row.revenue || 0;
            approExtraUnits += row.units || 0;
            approCount++;
          }
        }
        if (existingFab && approExtra > 0) {
          existingFab.totalCA += approExtra;
          existingFab.totalUnits += approExtraUnits;
          existingFab.asinCount += approCount;
          existingFab.hasApproData = true;
          log(`✓ Données annuelles ${year} Appro fusionnées: +${approCount} ASINs, +${approExtra.toFixed(0)}€`, 'ok');
        }
        client.imports.push({ date: new Date().toISOString(), type: file.type, distributorView: 'appro', market: file.market, periodStart: file.periodStart, periodEnd: file.periodEnd, periodType: 'annual', year, filename: file.filename, rowCount: file.rowCount });
        continue;
      }
      // Stock Appro : mettre à jour le stock existant avec les ASINs supplémentaires
      if (fileDistViewAnn === 'appro' && file.type === 'stock') {
        const existingStockFab = client.annualData[year]['stock'];
        if (existingStockFab) {
          let stockApproCount = 0;
          for (const row of file.data) {
            if (!row.asin) continue;
            const brand = norm(row.brand || '');
            const isFab = clientFabBrands.size === 0 || clientFabBrands.has(brand);
            if (!existingStockFab.asins[row.asin] && isFab) {
              existingStockFab.asins[row.asin] = { ...row, sourcingOnly: true };
              stockApproCount++;
            }
          }
          if (stockApproCount > 0) {
            existingStockFab.asinCount += stockApproCount;
            existingStockFab.hasApproData = true;
            log(`✓ Stock annuel ${year} Appro fusionné: +${stockApproCount} ASINs`, 'ok');
          }
        }
        client.imports.push({ date: new Date().toISOString(), type: file.type, distributorView: 'appro', market: file.market, periodStart: file.periodStart, periodEnd: file.periodEnd, periodType: 'annual', year, filename: file.filename, rowCount: file.rowCount });
        continue;
      }

      // Fab (ou premier import) : créer/écraser la base
      const annualASINs = {};
      let annualCA = 0, annualGV = 0, annualUnits = 0;
      for (const row of file.data) {
        if (!row.asin) continue;
        annualASINs[row.asin] = { ...row };
        if (file.type === 'ventes') { annualCA += row.revenue || 0; annualUnits += row.units || 0; }
        if (file.type === 'trafic') annualGV += row.glanceViews || 0;
      }
      client.annualData[year][file.type] = {
        periodStart: file.periodStart, periodEnd: file.periodEnd,
        totalCA: file.type === 'ventes' ? annualCA : 0,
        totalUnits: file.type === 'ventes' ? annualUnits : 0,
        totalGV: file.type === 'trafic' ? annualGV : 0,
        asinCount: file.data.length,
        asins: annualASINs,
        distributorView: fileDistViewAnn,
        importedAt: new Date().toISOString()
      };
      log(`✓ Données annuelles ${year} (${file.type}) vue=${fileDistViewAnn}: ${file.data.length} ASINs`, 'ok');
      client.imports.push({ date: new Date().toISOString(), type: file.type, distributorView: fileDistViewAnn, market: file.market, periodStart: file.periodStart, periodEnd: file.periodEnd, periodType: 'annual', year, filename: file.filename, rowCount: file.rowCount });
      continue;
    }

    if (periodType === 'ytd') {
      const fileDistViewYtd = file.distributorView || 'fab';
      // Fusion Fab/Appro pour YTD
      if (fileDistViewYtd === 'appro' && file.type === 'ventes') {
        const existingYtdFab = client.ytdData['ventes'];
        const fabYtdASINs = existingYtdFab ? existingYtdFab.asins || {} : {};
        let approYtdExtra = 0, approYtdUnits = 0, approYtdCount = 0;
        for (const row of file.data) {
          if (!row.asin) continue;
          const brand = norm(row.brand || '');
          const isFab = clientFabBrands.size === 0 || clientFabBrands.has(brand);
          if (!fabYtdASINs[row.asin] && isFab) {
            if (existingYtdFab) existingYtdFab.asins[row.asin] = { ...row, sourcingOnly: true };
            approYtdExtra += row.revenue || 0;
            approYtdUnits += row.units || 0;
            approYtdCount++;
          }
        }
        if (existingYtdFab && approYtdExtra > 0) {
          existingYtdFab.totalCA += approYtdExtra;
          existingYtdFab.totalUnits += approYtdUnits;
          existingYtdFab.asinCount += approYtdCount;
          existingYtdFab.hasApproData = true;
          log(`✓ Données YTD Appro fusionnées: +${approYtdCount} ASINs, +${approYtdExtra.toFixed(0)}€`, 'ok');
        }
        client.imports.push({ date: new Date().toISOString(), type: file.type, distributorView: 'appro', market: file.market, periodStart: file.periodStart, periodEnd: file.periodEnd, periodType: 'ytd', filename: file.filename, rowCount: file.rowCount });
        continue;
      }
      // Stock Appro YTD
      if (fileDistViewYtd === 'appro' && file.type === 'stock') {
        const existingYtdStock = client.ytdData['stock'];
        if (existingYtdStock) {
          let ytdStockCount = 0;
          for (const row of file.data) {
            if (!row.asin) continue;
            const brand = norm(row.brand || '');
            const isFab = clientFabBrands.size === 0 || clientFabBrands.has(brand);
            if (!existingYtdStock.asins[row.asin] && isFab) {
              existingYtdStock.asins[row.asin] = { ...row, sourcingOnly: true };
              ytdStockCount++;
            }
          }
          if (ytdStockCount > 0) {
            existingYtdStock.asinCount += ytdStockCount;
            existingYtdStock.hasApproData = true;
            log(`✓ Stock YTD Appro fusionné: +${ytdStockCount} ASINs`, 'ok');
          }
        }
        client.imports.push({ date: new Date().toISOString(), type: file.type, distributorView: 'appro', market: file.market, periodStart: file.periodStart, periodEnd: file.periodEnd, periodType: 'ytd', filename: file.filename, rowCount: file.rowCount });
        continue;
      }

      // Fab : créer/écraser la base YTD
      const ytdASINs = {};
      let ytdCA = 0, ytdGV = 0, ytdUnits = 0;
      for (const row of file.data) {
        if (!row.asin) continue;
        ytdASINs[row.asin] = { ...row };
        if (file.type === 'ventes') { ytdCA += row.revenue || 0; ytdUnits += row.units || 0; }
        if (file.type === 'trafic') ytdGV += row.glanceViews || 0;
      }
      client.ytdData[file.type] = {
        periodStart: file.periodStart, periodEnd: file.periodEnd,
        totalCA: file.type === 'ventes' ? ytdCA : 0,
        totalUnits: file.type === 'ventes' ? ytdUnits : 0,
        totalGV: file.type === 'trafic' ? ytdGV : 0,
        asinCount: file.data.length,
        asins: ytdASINs,
        distributorView: fileDistViewYtd,
        importedAt: new Date().toISOString()
      };
      log(`✓ Données YTD (${file.type}) vue=${fileDistViewYtd}: ${file.data.length} ASINs — ${file.periodStart} → ${file.periodEnd}`, 'ok');
      client.imports.push({ date: new Date().toISOString(), type: file.type, distributorView: fileDistViewYtd, market: file.market, periodStart: file.periodStart, periodEnd: file.periodEnd, periodType: 'ytd', filename: file.filename, rowCount: file.rowCount });
      continue;
    }

    // ── Hebdo / mensuel : archivage enrichi (avec support multi-semaines) ──
    // Calculer le nb de semaines couvertes par ce fichier
    let weeksCovered = 1;
    if (file.periodStart && file.periodEnd) {
      const pd = s => { const [d,m,y] = s.split('/').map(Number); return new Date(y,m-1,d); };
      const spanDays = Math.round((pd(file.periodEnd) - pd(file.periodStart)) / 86400000);
      weeksCovered = Math.max(1, Math.round(spanDays / 7));
    }
    const isMultiWeek = weeksCovered > 1;

    // Reset des champs du marché concerné avant chaque import
    // Évite les données "fantômes" des ASINs absents du nouveau CSV
    const fileMarket = file.market || '.fr';
    const fileDistView = file.distributorView || 'fab';
    // Construire le set des marques fabricant — disponible pour tous les blocs (annual, ytd, hebdo)
    const clientFabBrands = new Set(
      (client.brands || [])
        .filter(b => b.role === 'fabricant')
        .map(b => norm(b.name))
    );
    // Reset uniquement pour la vue Fabrication (vue principale)
    // La vue Approvisionnement fusionne sans reset : elle complète, ne remplace pas
    if (fileDistView !== 'appro') {
      if (file.type === 'ventes') {
        for (const [key, ex] of asinMap.entries()) {
          if ((ex.market || '.fr') === fileMarket) {
            ex.revenue = 0; ex.units = 0;
            ex.revenueDelta = null; ex.revenueYoY = null;
            ex.unitsDelta = null;
            ex.shippedRevenue = 0; ex.shippedUnits = 0;
            ex.returns = 0;
          }
        }
      }
      if (file.type === 'trafic') {
        for (const [key, ex] of asinMap.entries()) {
          if ((ex.market || '.fr') === fileMarket) {
            ex.glanceViews = 0; ex.gvDelta = null; ex.gvYoY = null;
          }
        }
      }
      if (file.type === 'stock') {
        for (const [key, ex] of asinMap.entries()) {
          if ((ex.market || '.fr') === fileMarket) {
            ex.sellableUnits = null; ex.sellableStock = null;
            ex.unsellableUnits = null; ex.unhealthyStock = null; ex.unhealthyUnits = null;
            ex.openPOQty = null; ex.oosPct = null;
            ex.retailPct = null; ex.confirmPct = null;
          }
        }
      }
    }

    for (const row of file.data) {
      const asinKey = row.asin + '|' + (row.market || '.fr');
      // Logique Fab vs Appro :
      // Vue Fab  → toujours inclure
      // Vue Appro → inclure uniquement si l'ASIN est absent de Fab ET sa marque est fabricant du client
      //           → sinon stocker shippedRevenue sur l'ASIN Fab existant
      if (fileDistView === 'appro') {
        if (file.type !== 'ventes') {
          // Trafic/Stock Appro : mettre à jour les ASINs existants uniquement, jamais créer
          if (!asinMap.has(asinKey)) continue;
        } else {
          // Ventes Appro : logique de fusion avec marques fabricant
          const brand = norm(row.brand || '');
          const isFabBrand = clientFabBrands.size === 0 || clientFabBrands.has(norm(brand));
          if (asinMap.has(asinKey)) {
            const ex = asinMap.get(asinKey);
            if (ex.sourcingOnly) {
              // ASIN sourcingOnly (appro) → mettre à jour revenue + metadata
              ex.revenue = row.revenue || 0;
              ex.units = row.units || 0;
              ex.revenueDelta = row.revenueDelta || null;
              ex.brand = row.brand || ex.brand;
              ex.title = row.title || ex.title;
            }
            // ASIN Fab → mettre à jour shippedRevenue uniquement
            if (row.shippedRevenue != null) ex.shippedRevenue = row.shippedRevenue || ex.revenue;
            if (row.shippedUnits != null) ex.shippedUnits = row.shippedUnits;
            continue;
          } else if (!isFabBrand) {
            // Marque inconnue/revendeur → ignorer
            continue;
          }
          // Marque fabricant absente de Fab → l'ajouter avec flag sourcingOnly
          row.sourcingOnly = true;
        }
      }
      if (asinMap.has(asinKey)) {
        const ex = asinMap.get(asinKey);
        if (file.type === 'ventes' && ex.revenue != null) {
          if (!ex.history) ex.history = [];

          if (isMultiWeek) {
            // Rattrapage congés : répartir le CA sur N semaines synthétiques
            const revenuePerWeek = Math.round((ex.revenue || 0) / weeksCovered);
            const unitsPerWeek   = Math.round((ex.units   || 0) / weeksCovered);
            const gvPerWeek      = Math.round((ex.glanceViews || 0) / weeksCovered);
            const pd = s => { const [d,m,y] = s.split('/').map(Number); return new Date(y,m-1,d); };
            const startD = pd(file.periodStart);
            for (let w = 0; w < weeksCovered; w++) {
              const weekEnd = new Date(startD.getTime() + (w + 1) * 7 * 86400000);
              const weekStart = new Date(startD.getTime() + w * 7 * 86400000);
              const wEnd = weekEnd.toLocaleDateString('fr-FR');
              const wStart = weekStart.toLocaleDateString('fr-FR');
              const already = ex.history.some(h => h.period === wEnd);
              if (!already) {
                ex.history.push({
                  period: wEnd, periodStart: wStart, periodType: 'weekly',
                  revenue: revenuePerWeek, units: unitsPerWeek,
                  glanceViews: gvPerWeek,
                  sellableUnits: ex.sellableUnits != null ? ex.sellableUnits : null,
                  retailPct: ex.retailPct || null, returns: 0,
                  revenueDelta: null, multiWeekImport: true
                });
                if (ex.history.length > 52) ex.history.shift();
              }
            }
          } else {
            // Import hebdo normal — archiver la semaine précédente
            const snapshot = {
              period: ex.periodEnd || 'prev',
              periodStart: ex.periodStart || null,
              periodType: ex.periodType || 'weekly',
              revenue: ex.revenue || 0,
              units: ex.units || 0,
              glanceViews: ex.glanceViews || 0,
              sellableUnits: ex.sellableUnits != null ? ex.sellableUnits : null,
              retailPct: ex.retailPct || null,
              returns: ex.returns || 0,
              revenueDelta: ex.revenueDelta || null
            };
            const alreadyArchived = ex.history.some(h => h.period === snapshot.period);
            if (!alreadyArchived) {
              ex.history.push(snapshot);
              if (ex.history.length > 52) ex.history.shift();
            }
          }
        }
        for (const [k, v] of Object.entries(row)) { if (v !== '' && v !== 0 && v != null) ex[k] = v; }
      } else {
        asinMap.set(asinKey, { ...row, history: [] });
      }
      if (file.type === 'ventes') { totalCA += row.revenue || 0; totalUnits += row.units || 0; }
      if (file.type === 'trafic') totalGV += row.glanceViews || 0;
    }
    client.imports.push({ date: new Date().toISOString(), type: file.type, market: file.market, distributorView: file.distributorView || 'fab', periodStart: file.periodStart, periodEnd: file.periodEnd, periodType: file.periodType, filename: file.filename, rowCount: file.rowCount });
  }

  client.asins = Array.from(asinMap.values());
  client.csvImported = client.asins.length > 0;
  if (!client.history) client.history = { weekly: [], monthly: [], yearly: [] };
  if (totalCA > 0 || totalGV > 0) {
    const entry = { period: periodLabel, date: new Date().toISOString(), totalCA, totalUnits, totalGV, asinCount: client.asins.length };
    const hArr = client.history[periodType === 'monthly' ? 'monthly' : 'weekly'];
    hArr.push(entry);
    if (hArr.length > 52) hArr.shift();
  }

  // ── Option C : snapshot mensuel par ASIN ──────────────────
  // Déterminer le mois/année de l'import courant
  if (periodType === 'weekly' && periodLabel) {
    const importDate = parsedFiles.find(f => f?.periodEnd)?.periodEnd;
    if (importDate) {
      const [dd, mm, yyyy] = importDate.split('/');
      const monthKey = yyyy + '-' + mm; // ex: "2026-04"
      // Pour chaque ASIN, créer/mettre à jour le snapshot mensuel
      for (const a of client.asins) {
        if (!a.historyMonthly) a.historyMonthly = [];
        // Chercher si ce mois existe déjà
        const existingIdx = a.historyMonthly.findIndex(m => m.monthKey === monthKey);
        const monthSnap = {
          monthKey,
          label: mm + '/' + yyyy,
          revenue: (existingIdx >= 0 ? a.historyMonthly[existingIdx].revenue : 0) + (a.revenue || 0),
          units: (existingIdx >= 0 ? a.historyMonthly[existingIdx].units : 0) + (a.units || 0),
          glanceViews: (existingIdx >= 0 ? a.historyMonthly[existingIdx].glanceViews : 0) + (a.glanceViews || 0),
          weeks: (existingIdx >= 0 ? a.historyMonthly[existingIdx].weeks : 0) + 1,
          sellableUnitsLast: a.sellableUnits != null ? a.sellableUnits : (existingIdx >= 0 ? a.historyMonthly[existingIdx].sellableUnitsLast : null),
          updatedAt: new Date().toISOString()
        };
        if (existingIdx >= 0) {
          a.historyMonthly[existingIdx] = monthSnap;
        } else {
          a.historyMonthly.push(monthSnap);
          // Garder 24 mois max (2 ans)
          if (a.historyMonthly.length > 24) a.historyMonthly.shift();
        }
      }
    }
  }

  // Collecter les marchés depuis les items individuels (important pour CSV multi-boutiques)
  for (const f of parsedFiles) { if (f?.market && !client.markets.includes(f.market)) client.markets.push(f.market); }
  for (const a of client.asins) { if (a.market && !client.markets.includes(a.market)) client.markets.push(a.market); }
  client.markets.sort();
  // Régénérer le plan d'action après chaque import pour refléter les nouvelles données
  client.weeklyActions = generateWeeklyActions(client);
  log(`🔗 Merge terminé: ${client.asins.length} ASINs hebdo`, 'ok');
  return client;
}
function calcHealth(a) {
  let s = 50;
  const rd = parseNum(a.revenueDelta);
  if (rd > 20) s += 30; else if (rd > 0) s += 15 + rd * 0.75; else if (rd > -20) s += rd * 1.5; else s -= 30;
  if (a.sellableUnits > 100) s += 25; else if (a.sellableUnits > 50) s += 15; else if (a.sellableUnits > 20) s += 5; else if (a.sellableUnits > 0) s -= 10; else if (a.sellableUnits === 0 && a.revenue > 0) s -= 25;
  const gd = parseNum(a.gvDelta);
  if (gd > 20) s += 20; else if (gd > 0) s += 10 + gd * 0.5; else if (gd > -20) s += gd; else s -= 20;
  const rp = parseNum(a.retailPct);
  if (rp > 90) s += 15; else if (rp > 70) s += 10; else if (rp > 50) s += 5; else if (rp > 0) s -= 5;
  if (a.returns > 10) s -= 10; else if (a.returns > 5) s -= 5;
  return Math.max(0, Math.min(100, Math.round(s)));
}

function calcHealthDeep(a, c) {
  // Health score enrichi tenant compte de la tendance longue
  let score = calcHealth(a); // base : health court terme
  const deep = calcTrendDeep(a, c);
  if (!deep.hasLongData) return score; // pas de données longues = pas de bonus/malus

  // Bonus/malus selon signal composite
  if (deep.signalCls === 'trend-up')        score = Math.min(100, score + 12);
  else if (deep.signalCls === 'trend-up-soft')   score = Math.min(100, score + 5);
  else if (deep.signalCls === 'trend-down')      score = Math.max(0,   score - 15);
  else if (deep.signalCls === 'trend-down-soft') score = Math.max(0,   score - 8);
  // "Creux ponctuel sur fond haussier" : ne pas pénaliser
  if (deep.signal.includes('fond haussier')) score = Math.max(score, 45);

  return Math.round(score);
}

function healthClass(score) {
  if (score >= 80) return 'excellent';
  if (score >= 60) return 'good';
  if (score >= 40) return 'warning';
  return 'critical';
}

function calcSegment(a, totalCA) {
  if (!totalCA || !(a.revenue > 0)) return 'C';
  const pct = (a.revenue / totalCA) * 100;
  if (pct > 2) return 'A';
  if (pct > 0.5) return 'B';
  return 'C';
}

// ── Fraîcheur des données ────────────────────────────────────────
// Retourne un objet par type : { ventes, trafic, stock }
// Chaque entrée : { lastDate, daysSince, weeksBehind, missing, status }
// status : 'ok' (semaine précédente couverte) | 'stale' (1 sem. derrière) | 'missing' (2+ sem. ou absent)
// Logique métier : les données de la semaine S-1 sont disponibles le lundi de la semaine S.
// On vérifie donc que le dernier import couvre bien la semaine ISO précédente, pas juste l'ancienneté.
function getDataFreshness(c) {
  if (!c?.imports?.length) {
    return {
      ventes: { missing: true, status: 'missing', daysSince: null },
      trafic: { missing: true, status: 'missing', daysSince: null },
      stock:  { missing: true, status: 'missing', daysSince: null }
    };
  }
  const now = new Date();
  const currentWeek = getISOWeek(now);
  const currentYear = now.getFullYear();

  // Logique Amazon : les données de la semaine S-1 sont disponibles depuis le lundi de S.
  // Mais le consultant doit les importer ce lundi — donc si on est lundi et que
  // le dernier import date d'avant aujourd'hui, il faut renouveler.
  // Règle : targetWeek = semaine courante SI on est lundi ET import < aujourd'hui
  //         targetWeek = semaine précédente sinon
  // La semaine cible est TOUJOURS la semaine précédente (S-1)
  // Le lundi S17, Amazon publie les données de S16 → targetWeek = S16
  // Le mercredi S17, les données de S16 sont toujours les dernières → targetWeek = S16
  const targetWeek = currentWeek - 1 > 0 ? currentWeek - 1 : 52;
  const targetYear = currentWeek - 1 > 0 ? currentYear : currentYear - 1;

  const result = {};
  ['ventes', 'trafic', 'stock'].forEach(type => {
    const last = c.imports
      .filter(i => i.type === type && (i.periodType === 'weekly' || !i.periodType))
      .sort((a, b) => new Date(b.date) - new Date(a.date))[0];

    if (!last) {
      result[type] = { missing: true, status: 'missing', daysSince: null, lastDate: null };
      return;
    }

    const lastDate = new Date(last.date);
    const daysSince = Math.floor((now - lastDate) / 86400000);

    // Utiliser periodEnd (fin de période couverte) plutôt que la date d'import
    // Ex: import fait le jeudi 16 avril (S16) mais qui couvre la semaine S15 (5-11 avril)
    // periodEnd = '11/04/2026' → semaine couverte = S15, pas S16
    const coverDate = last.periodEnd
      ? (() => {
          // periodEnd peut être 'dd/mm/yyyy' ou 'yyyy-mm-dd'
          const parts = last.periodEnd.includes('/') ? last.periodEnd.split('/') : null;
          return parts
            ? new Date(parts[2], parts[1]-1, parts[0])  // dd/mm/yyyy
            : new Date(last.periodEnd);                   // yyyy-mm-dd
        })()
      : lastDate;

    const lastWeek = getISOWeek(coverDate);
    const lastYear = coverDate.getFullYear();

    // Calculer le retard en semaines par rapport à la semaine cible
    // targetWeek = S16 si on est S17 (lundi)
    const weeksBehind = (targetYear - lastYear) * 52 + (targetWeek - lastWeek);

    // Statut basé sur les semaines de retard (logique métier Amazon)
    // weeksBehind <= 0 : données couvrent la semaine cible ou plus récent → à jour
    // weeksBehind == 1 : semaine cible non couverte → à renouveler
    // weeksBehind >= 2 : 2+ semaines de retard → manquant
    let status;
    if (weeksBehind <= 0) {
      status = 'ok';
    } else if (weeksBehind === 1) {
      status = 'stale';
    } else {
      status = 'missing';
    }

    result[type] = {
      missing: false,
      daysSince,
      weeksBehind,
      targetWeek,
      targetYear,
      lastWeek,
      lastYear,
      coverDate: coverDate.toLocaleDateString('fr-FR'),
      lastDate: lastDate.toLocaleDateString('fr-FR'),
      periodEnd: last.periodEnd || null,
      market: last.market || c.mainMarket || '.fr',
      status
    };
  });
  return result;
}


// Retourne la plage de dates d'une semaine ISO (ex: "14-20 avr.")
function getWeekDateRange(week, year) {
  // Trouver le lundi de cette semaine ISO
  const jan4 = new Date(year, 0, 4); // 4 jan est toujours en S1
  const dayOfWeek = jan4.getDay() || 7;
  const monday = new Date(jan4);
  monday.setDate(jan4.getDate() - dayOfWeek + 1 + (week - 1) * 7);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  const fmt = d => d.getDate() + ' ' + d.toLocaleDateString('fr-FR', {month:'short'});
  return fmt(monday) + ' – ' + fmt(sunday);
}

function getISOWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

// ── Bloc comparatif YTD N vs N-1 ─────────────────────────────
function renderYTDComparison(c) {
  const ytd = c.ytdData?.ventes;
  if (!ytd) return '';

  // Chercher N-1 dans annualData pour la même période
  const currentYear = new Date().getFullYear().toString();
  const prevYear = (parseInt(currentYear) - 1).toString();
  const annualPrev = c.annualData?.[prevYear]?.ventes;

  const ytdCA = ytd.totalCA || 0;
  const ytdUnits = ytd.totalUnits || 0;
  const ytdGV = c.ytdData?.trafic?.totalGV || 0;

  // Calcul YoY sur même période
  // Utiliser revenueYoY du fichier YTD si pas de données N-1 chargées
  // Sinon calculer depuis annualPrev (approximation : annuel × prorata jours)
  let ytdVsNm1 = null;
  if (annualPrev) {
    // Prorata : si YTD couvre X jours sur 365, on prend X/365 du CA annuel N-1
    const [ds, ms, ys] = (ytd.periodStart || '01/01/'+currentYear).split('/').map(Number);
    const [de, me, ye] = (ytd.periodEnd || '').split('/').map(Number);
    if (de && me && ye) {
      const startD = new Date(ys, ms-1, ds);
      const endD = new Date(ye, me-1, de);
      const daysYTD = Math.round((endD - startD) / 86400000);
      const annualPrevCA = annualPrev.totalCA || 0;
      const prorataPrev = annualPrevCA * (daysYTD / 365);
      if (prorataPrev > 0) ytdVsNm1 = ((ytdCA - prorataPrev) / prorataPrev * 100).toFixed(1);
    }
  }

  const annualYears = Object.keys(c.annualData || {}).sort().reverse();
  const hasAnnual = annualYears.length > 0;

  let h = `<div class="cd" style="margin-bottom:14px">`;
  h += `<div class="cd-t space"><span>📅 Vision Annuelle</span>`;
  if (!hasAnnual) h += `<button class="btn btn-sm" onclick="go('import')" style="border-color:var(--or-border);color:var(--or)">+ Charger historique N-1/N-2</button>`;
  h += `</div>`;

  // Grille : YTD en cours + années historiques
  h += `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px">`;

  // YTD courant
  const ytdLabel = `${ytd.periodStart?.slice(6,10) || currentYear} YTD (${ytd.periodStart?.slice(0,5) || '01/01'} → ${ytd.periodEnd?.slice(0,5) || '?'})`;
  h += `<div style="padding:14px 16px;background:var(--or-l);border:1px solid var(--or-border);border-radius:var(--rdl)">
    <div style="font-size:10px;font-weight:600;color:var(--or);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">${ytdLabel}</div>
    <div style="font-size:22px;font-weight:700">${fmtEur(ytdCA)}</div>
    <div style="font-size:11px;color:var(--tx2);margin-top:4px">${fmt(ytdUnits)} unités${ytdGV ? ' · ' + fmt(ytdGV) + ' GV' : ''}</div>
    ${ytdVsNm1 !== null ? `<div style="font-size:12px;font-weight:600;margin-top:6px;color:${parseFloat(ytdVsNm1)>=0?'var(--g)':'var(--r)'}">
      ${parseFloat(ytdVsNm1)>=0?'▲':'▼'} ${Math.abs(ytdVsNm1)}% vs ${prevYear} même période
    </div>` : ''}
  </div>`;

  // Années historiques chargées
  annualYears.slice(0,3).forEach(year => {
    const ann = c.annualData[year];
    const annCA = ann.ventes?.totalCA || 0;
    const annUnits = ann.ventes?.totalUnits || 0;
    const annGV = ann.trafic?.totalGV || 0;
    const hasVentes = !!ann.ventes;
    const hasTrafic = !!ann.trafic;
    const hasStock = !!ann.stock;
    h += `<div style="padding:14px 16px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--rdl)">
      <div style="font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">
        ${year} — Annuel
        <span style="margin-left:6px">${hasVentes?'💰':''}${hasTrafic?'👁':''}${hasStock?'📦':''}</span>
      </div>
      ${annCA ? `<div style="font-size:22px;font-weight:700">${fmtEur(annCA)}</div>
      <div style="font-size:11px;color:var(--tx2);margin-top:4px">${fmt(annUnits)} unités${annGV?' · '+fmt(annGV)+' GV':''}</div>` : `<div style="font-size:12px;color:var(--tx3);padding:8px 0">Ventes non chargées</div>`}
    </div>`;
  });

  // Slot vide si pas d'historique
  if (!hasAnnual) {
    [prevYear, (parseInt(currentYear)-2).toString()].forEach(year => {
      h += `<div style="padding:14px 16px;background:var(--s2);border:1px dashed var(--bd3);border-radius:var(--rdl);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;min-height:90px;cursor:pointer" onclick="go('import')">
        <div style="font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase">${year} — Annuel</div>
        <div style="font-size:11px;color:var(--tx3)">+ Importer</div>
      </div>`;
    });
  }

  h += `</div></div>`;
  return h;
}

// Tendance structurelle sur l'historique (régression linéaire)
// Retourne : { slope, label, cls, sparkPoints, periods }
function calcTrend(a) {
  // Reconstituer la série : historique + valeur actuelle
  const hist = (a.history || []).slice(-5); // max 5 périodes passées
  if (!hist.length) return null;

  const series = [...hist.map(h => h.revenue || 0), a.revenue || 0];
  const n = series.length;
  if (n < 2) return null;

  // Régression linéaire simple y = mx + b
  const sumX = n*(n-1)/2;
  const sumX2 = n*(n-1)*(2*n-1)/6;
  const sumY = series.reduce((s,v) => s+v, 0);
  const sumXY = series.reduce((s,v,i) => s+i*v, 0);
  const slope = (n*sumXY - sumX*sumY) / (n*sumX2 - sumX*sumX);

  // Normaliser la pente par rapport à la moyenne
  const mean = sumY / n;
  const slopePct = mean > 0 ? (slope / mean) * 100 : 0;

  // Classification
  let label, cls, icon;
  if (slopePct > 8) {
    label = 'Croissance'; cls = 'trend-up'; icon = '↗';
  } else if (slopePct > 2) {
    label = 'Hausse'; cls = 'trend-up-soft'; icon = '↗';
  } else if (slopePct < -8) {
    label = 'Déclin'; cls = 'trend-down'; icon = '↘';
  } else if (slopePct < -2) {
    label = 'Baisse'; cls = 'trend-down-soft'; icon = '↘';
  } else {
    label = 'Stable'; cls = 'trend-stable'; icon = '→';
  }

  return { slope: slopePct, label, cls, icon, series, n };
}

// Mini sparkline SVG inline (40x20px)
function sparkline(series, cls) {
  if (!series || series.length < 2) return '';
  const w = 44, h = 18, pad = 2;
  const min = Math.min(...series);
  const max = Math.max(...series);
  const range = max - min || 1;
  const pts = series.map((v, i) => {
    const x = pad + (i / (series.length - 1)) * (w - pad*2);
    const y = h - pad - ((v - min) / range) * (h - pad*2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const color = cls === 'trend-up' ? '#16A34A'
    : cls === 'trend-up-soft' ? '#65A30D'
    : cls === 'trend-down' ? '#DC2626'
    : cls === 'trend-down-soft' ? '#EA580C'
    : '#9AA0AE';
  return `<svg width="${w}" height="${h}" style="display:block;flex-shrink:0" viewBox="0 0 ${w} ${h}">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${pts.split(' ').pop().split(',')[0]}" cy="${pts.split(' ').pop().split(',')[1]}" r="2.5" fill="${color}"/>
  </svg>`;
}

function getFilteredAsins(client) {
  if (!client?.asins) return [];
  let asins = [...client.asins];
  // Filtre de vue prédéfinie (alertes, segments)
  if (asinViewAsins !== null) {
    const viewSet = new Set(asinViewAsins);
    asins = asins.filter(a => viewSet.has(a.asin));
  }
  if (filters.market !== 'all') asins = asins.filter(a => a.market === filters.market);
  if (filters.brand !== 'all') asins = asins.filter(a => a.brand && norm(a.brand) === norm(filters.brand));
  if (filters.segment !== 'all') {
    const tc = asins.reduce((s, a) => s + (a.revenue || 0), 0);
    asins = asins.filter(a => calcSegment(a, tc) === filters.segment);
  }
  // Recherche texte : ASIN, SKU (depuis catalogue), mot dans le titre, marque
  if (asinSearch && asinSearch.trim()) {
    const q = asinSearch.trim().toLowerCase();
    // Construire un index SKU depuis le catalogue si disponible
    const catMap = {};
    (client.catalogue || []).forEach(e => { catMap[e.asin] = e; });
    asins = asins.filter(a => {
      const cat = catMap[a.asin];
      return (
        (a.asin  && a.asin.toLowerCase().includes(q)) ||
        (a.title && a.title.toLowerCase().includes(q)) ||
        (a.brand && a.brand.toLowerCase().includes(q)) ||
        (cat?.sku && cat.sku.toLowerCase().includes(q)) ||
        (cat?.ean && cat.ean.toLowerCase().includes(q))
      );
    });
  }
  return asins;
}
function generateWeeklyActions(client) {
  if (!client?.asins?.length) return [];

  const activeAsins = asins.filter(a => (a.revenue || 0) > 0);
  const totalCA = asins.reduce((s, a) => s + (a.revenue || 0), 0);

  const freshness = getDataFreshness(client);
  const ventesStatus = freshness.ventes.status;
  const targetWeekAction = freshness.ventes.targetWeek || (getISOWeek(new Date()) - 1);
  const lastWeekCovered  = freshness.ventes.lastWeek;

  const lastImport = client.imports?.filter(i => i.periodType === 'weekly' || !i.periodType)
    .sort((a, b) => new Date(b.date) - new Date(a.date))[0];

    ? Math.floor((Date.now() - new Date(lastImport.date)) / 86400000)
    : null;

  const justReturned = !clientAway && client.awayUntil
    && Math.floor((Date.now() - new Date(client.awayUntil)) / 86400000) <= 7;
  const weeksMissed = justReturned && lastImport
    ? Math.round(daysSinceImport / 7)
    : 0;

  let importPriority, importTitle, importDesc;

    const retourDate = new Date(client.awayUntil).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' });

    importTitle = '🏖️ En congés — import suspendu';

  // ── LUNDI — Urgences stock & buy box ──────────────────────────

    const oos = parseNum(a.oosPct);
    const stock = a.sellableUnits;

  // ── Ruptures fournisseur via POs ──────────────────────────────

  const posRuptPartiels = (client.pos||[]).filter(p => { const q=p.qty||0,a=p.qtyAccepted??q; return q>0&&a>0&&a<q*0.8; });

async function callAPI(sys, usr) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: localStorage.getItem('ap-model') || 'claude-sonnet-4-20250514',
      max_tokens: 2500,
      system: sys,
      messages: [{ role: 'user', content: usr }]
    })
  });
  return res;
}

async function askClaude(sys, usr) {
  if (!apiKey) return `__ERR_NOKEY__`;
  try {
    log('🤖 Appel Claude API...');
    let res = await callAPI(sys, usr);
    // Retry auto sur surcharge
    if (res.status === 529 || res.status === 503) {
      log('⏳ API surchargée — retry dans 4s...', 'warn');
      await new Promise(r => setTimeout(r, 4000));
      res = await callAPI(sys, usr);
    }
    if (!res.ok) {
      const et = await res.text();
      log('API Error ' + res.status, 'err');
      if (res.status === 401) return `__ERR_401__`;
      if (res.status === 403) return `__ERR_403__`;
      if (res.status === 529 || res.status === 503) return `__ERR_529__`;
      if (res.status === 429) return `__ERR_429__`;
      return `__ERR_${res.status}__` + et.slice(0, 150);
    }
    const d = await res.json();
    log('✓ Réponse OK', 'ok');
    return d.content?.map(b => b.text || '').join('\n') || 'Pas de réponse';
  } catch(e) {
    log('AI Error: ' + e.message, 'err');
    if (e.message.includes('Failed to fetch')) return `__ERR_CORS__`;
    return `__ERR_UNKNOWN__` + e.message;
  }
}

function isAIError(r) { return r && typeof r === 'string' && r.startsWith('__ERR_'); }

function renderAIError(code, retryFn) {
  const MSGS = {
    '__ERR_NOKEY__': { icon: '🔑', title: 'Clé API non configurée',
      body: 'Allez dans ⚙️ Configuration et entrez votre clé Anthropic (sk-ant-...).', retry: false },
    '__ERR_401__':   { icon: '🔑', title: 'Clé API invalide',
      body: 'Vérifiez votre clé dans ⚙️ Configuration.', retry: false },
    '__ERR_403__':   { icon: '🚫', title: 'Accès refusé (CORS)',
      body: "Utilisez l'app dans un Artifact Claude.ai.", retry: false },
    '__ERR_529__':   { icon: '⏱️', title: 'API momentanément surchargée',
      body: 'Les serveurs Anthropic sont très sollicités en ce moment. Un retry automatique a déjà été tenté. Réessayez dans quelques instants.', retry: true },
    '__ERR_429__':   { icon: '🔄', title: 'Limite de débit atteinte',
      body: 'Trop de requêtes consécutives. Attendez 30 secondes avant de réessayer.', retry: true },
    '__ERR_CORS__':  { icon: '🌐', title: 'Erreur de connexion',
      body: "Utilisez l'app dans un Artifact Claude.ai.", retry: false },
  };
  const key = Object.keys(MSGS).find(k => code.startsWith(k));
  const m = key ? MSGS[key] : { icon: '❌', title: 'Erreur inattendue',
    body: code.replace(/^__ERR_\d+__/, ''), retry: true };
  const btn = (m.retry && retryFn)
    ? `<button class="btn btn-sm" onclick="${retryFn}" style="flex-shrink:0;border-color:var(--r-bd);color:var(--r)">↻ Réessayer</button>`
    : '';
  return `<div style="display:flex;align-items:flex-start;gap:12px;padding:16px;background:var(--r-bg);border:1px solid var(--r-bd);border-radius:var(--rdl);margin-top:12px">
    <span style="font-size:22px;flex-shrink:0">${m.icon}</span>
    <div style="flex:1">
      <div style="font-weight:600;font-size:13px;margin-bottom:4px;color:var(--r)">${m.title}</div>
      <div style="font-size:12px;color:var(--tx2);line-height:1.6">${m.body}</div>
    </div>
    ${btn}
  </div>`;
}

// Tendance structurelle enrichie — croise 4 sources de données
function calcTrendDeep(a, c) {
  const curYear = new Date().getFullYear().toString();
  const prevYear = (parseInt(curYear) - 1).toString();
  const prev2Year = (parseInt(curYear) - 2).toString();

  // Récupérer les valeurs ASIN dans les données annuelles
  const ann2 = c.annualData?.[prev2Year]?.ventes?.asins?.[a.asin];
  const ann1 = c.annualData?.[prevYear]?.ventes?.asins?.[a.asin];
  const ytdA = c.ytdData?.ventes?.asins?.[a.asin];

  const ca2  = ann2 ? parseNum(ann2.revenue) : null;
  const ca1  = ann1 ? parseNum(ann1.revenue) : null;
  const caYTD = ytdA ? parseNum(ytdA.revenue) : null;
  const caNow = a.revenue || 0;

  // YoY Amazon-fourni (plus fiable si pas de données annuelles)
  const yoyAmazon = a.revenueYoY ? parseNum(a.revenueYoY) : null;

  // Construire la série longue (annuel → hebdo récent)
  const longSeries = [];
  if (ca2 !== null) longSeries.push({ label: prev2Year, value: ca2, type: 'annual' });
  if (ca1 !== null) longSeries.push({ label: prevYear, value: ca1, type: 'annual' });

  // Extrapoler le YTD en annuel si disponible
  if (caYTD !== null && c.ytdData?.ventes?.periodStart && c.ytdData?.ventes?.periodEnd) {
    const [ds,ms,ys] = (c.ytdData.ventes.periodStart).split('/').map(Number);
    const [de,me,ye] = (c.ytdData.ventes.periodEnd).split('/').map(Number);
    const daysYTD = Math.round((new Date(ye,me-1,de) - new Date(ys,ms-1,ds)) / 86400000);
    if (daysYTD > 0) {
      const extrapolated = Math.round(caYTD * 365 / daysYTD);
      longSeries.push({ label: curYear + ' (extrap.)', value: extrapolated, type: 'ytd_extrap', ytdActual: caYTD, daysYTD });
    }
  }

  // Tendance court terme (historique hebdo)
  const shortTrend = calcTrend(a);

  // Calculs de croissance longue
  let longGrowth = null, longGrowthLabel = '';
  if (ca1 !== null && ca2 !== null && ca2 > 0) {
    longGrowth = ((ca1 - ca2) / ca2 * 100).toFixed(1);
    longGrowthLabel = `${prev2Year}→${prevYear}: ${parseFloat(longGrowth) >= 0 ? '+' : ''}${longGrowth}%`;
  }
  let ytdVsN1 = null;
  if (yoyAmazon !== null) {
    ytdVsN1 = yoyAmazon;
  } else if (caYTD !== null && ca1 !== null && ca1 > 0 && c.ytdData?.ventes?.periodEnd) {
    const [ds,ms,ys] = (c.ytdData.ventes.periodStart||'01/01/'+curYear).split('/').map(Number);
    const [de,me,ye] = (c.ytdData.ventes.periodEnd).split('/').map(Number);
    const daysYTD = Math.round((new Date(ye,me-1,de) - new Date(ys,ms-1,ds)) / 86400000);
    const prorata = ca1 * (daysYTD / 365);
    if (prorata > 0) ytdVsN1 = parseFloat(((caYTD - prorata) / prorata * 100).toFixed(1));
  }

  // Signal composite : court terme vs long terme
  let signal = 'Données insuffisantes';
  let signalCls = 'trend-stable';
  const shortSlope = shortTrend?.slope || null;

  if (longSeries.length >= 2 && shortSlope !== null) {
    const longUp = (ca1 !== null && ca2 !== null && ca1 > ca2) || ytdVsN1 > 10;
    const longDown = (ca1 !== null && ca2 !== null && ca1 < ca2) || ytdVsN1 < -10;
    const shortUp = shortSlope > 2;
    const shortDown = shortSlope < -2;

    if (longUp && shortUp)   { signal = 'Croissance confirmée';      signalCls = 'trend-up'; }
    else if (longUp && shortDown) { signal = 'Creux ponctuel — fond haussier'; signalCls = 'trend-up-soft'; }
    else if (longDown && shortDown) { signal = 'Déclin structurel';          signalCls = 'trend-down'; }
    else if (longDown && shortUp)  { signal = 'Rebond sur fond baissier';    signalCls = 'trend-down-soft'; }
    else if (longUp)   { signal = 'Tendance haussière — court terme stable'; signalCls = 'trend-up-soft'; }
    else if (longDown) { signal = 'Tendance baissière — surveiller';          signalCls = 'trend-down-soft'; }
    else { signal = 'Stable'; signalCls = 'trend-stable'; }
  } else if (shortTrend) {
    signal = shortTrend.label + ' (court terme uniquement)';
    signalCls = shortTrend.cls;
  }

  return {
    longSeries, ca2, ca1, caYTD, caNow,
    longGrowth, longGrowthLabel,
    ytdVsN1, yoyAmazon,
    shortTrend, signal, signalCls,
    hasLongData: longSeries.length >= 2,
    prevYear, prev2Year, curYear
  };
}

// Construit le bloc contexte historique injecté dans les prompts IA
function buildAsinContext(a, c) {
  const deep = calcTrendDeep(a, c);
  const lines = [];

  lines.push('📈 CONTEXTE HISTORIQUE:');

  if (deep.ca2 !== null) {
    lines.push(`- ${deep.prev2Year}: ${fmtEur(deep.ca2)}`);
  }
  if (deep.ca1 !== null) {
    const delta = deep.ca2 ? ` (${parseFloat(((deep.ca1-deep.ca2)/deep.ca2*100).toFixed(1))>=0?'+':''}${((deep.ca1-deep.ca2)/deep.ca2*100).toFixed(1)}% vs ${deep.prev2Year})` : '';
    lines.push(`- ${deep.prevYear}: ${fmtEur(deep.ca1)}${delta}`);
  }
  if (deep.caYTD !== null) {
    const ytdPeriod = c.ytdData?.ventes?.periodEnd ? `01/01/${deep.curYear}→${c.ytdData.ventes.periodEnd}` : `YTD ${deep.curYear}`;
    const ytdDelta = deep.ytdVsN1 !== null ? ` (${deep.ytdVsN1>=0?'+':''}${deep.ytdVsN1}% vs même période ${deep.prevYear})` : '';
    lines.push(`- ${ytdPeriod}: ${fmtEur(deep.caYTD)}${ytdDelta}`);
  } else if (a.revenueYoY) {
    lines.push(`- YoY (fourni par Amazon): ${a.revenueYoY}`);
  }

  if (deep.shortTrend) {
    lines.push(`- Tendance court terme (${deep.shortTrend.n} semaines): ${deep.shortTrend.label} (pente ${deep.shortTrend.slope > 0 ? '+' : ''}${deep.shortTrend.slope.toFixed(1)}%/sem.)`);
  }

  lines.push(`- ⚡ Signal composite: ${deep.signal}`);

  if (!deep.hasLongData && !deep.yoyAmazon) {
    lines.push('- ⚠ Pas de données annuelles chargées — analyse limitée au court terme');
  }

  // Ajouter les 8 dernières semaines si disponibles
  if (a.history?.length > 0) {
    lines.push('');
    lines.push('📊 HISTORIQUE HEBDO (8 dernières semaines, plus récent en premier):');
    const recent = a.history.slice(-8).reverse();
    recent.forEach(h => {
      const period = h.periodStart ? h.periodStart.slice(0,5)+'→'+h.period.slice(0,5) : (h.period||'?');
      const stock = h.sellableUnits != null ? ' | Stock: '+h.sellableUnits+'u' : '';
      const delta = h.revenueDelta ? ' | Δ '+h.revenueDelta : '';
      lines.push(`  ${period}: ${fmtEur(h.revenue||0)} (${fmt(h.units||0)}u | GV: ${fmt(h.glanceViews||0)}${stock}${delta})`);
    });
  }

  // Synthèses mensuelles si disponibles
  if (a.historyMonthly?.length > 0) {
    lines.push('');
    lines.push('📆 SYNTHÈSES MENSUELLES (6 derniers mois):');
    a.historyMonthly.slice(-6).reverse().forEach(m => {
      lines.push(`  ${m.label}: ${fmtEur(m.revenue||0)} (${fmt(m.units||0)}u | ${m.weeks} sem. | Stock fin: ${m.sellableUnitsLast!=null?m.sellableUnitsLast+'u':'N/A'})`);
    });
  }

  // PPM Nette
  const ppmEntry = (c.ppmData||{})[a.asin];
  if (ppmEntry?.ppm != null) {
    lines.push('');
    lines.push('💰 PPM NETTE : ' + ppmEntry.ppm.toFixed(1) + '%'
      + (ppmEntry.ppmDeltaBps ? ' (Δ vs N-1 : ' + (ppmEntry.ppmDeltaBps > 0 ? '+' : '') + (ppmEntry.ppmDeltaBps/100).toFixed(2) + '%)' : '')
      + (ppmEntry.ppm < 5 ? ' — ⚠️ FAIBLE : risque de déréférencement Amazon' : ppmEntry.ppm >= 20 ? ' — ✓ Bonne marge' : ''));
  }

  // Prévisions Amazon
  const fcEntry = (c.forecastData||{})[a.asin];
  if (fcEntry?.weeks?.length >= 4) {
    const s1 = Math.round(fcEntry.weeks[1]||0);
    const s4avg = Math.round(((fcEntry.weeks[1]||0)+(fcEntry.weeks[2]||0)+(fcEntry.weeks[3]||0)+(fcEntry.weeks[4]||0))/4);
    lines.push('');
    lines.push('📊 PRÉVISIONS AMAZON (prochaines semaines) :');
    lines.push('  S+1 : ' + s1 + 'u prévues | Moy. S+1→S+4 : ' + s4avg + 'u/sem.');
    const velocite = a.history?.length >= 2 ? Math.round(a.history.slice(-4).reduce((s,h)=>s+(h.units||0),0)/Math.min(a.history.length,4)) : (a.units||0);
    if (velocite > 0) {
      const ratio = Math.round(s4avg/velocite*100);
      lines.push('  Vs vélocité actuelle (' + velocite + 'u) : ' + ratio + '%' + (ratio > 110 ? ' — Amazon anticipe une hausse' : ratio < 90 ? ' — Amazon anticipe une baisse' : ' — stable'));
    }
  }

  // POs actifs et statut fournisseur
  const poInfo = getPOsForAsin(a.asin, c);
  if (poInfo) {
    lines.push('');
    lines.push('📦 BONS DE COMMANDE EN COURS:');
    if (poInfo.ruptureTotal) {
      lines.push('  🚫 RUPTURE TOTALE FOURNISSEUR — Amazon a commandé mais rien accepté.');
    } else if (poInfo.rupturePartielle) {
      lines.push('  ⚠️ Rupture partielle fournisseur — taux d\'acceptation : '+poInfo.tauxAcceptation+'%');
    }
    if (poInfo.qtyEnTransit > 0) {
      lines.push('  Quantité en transit : '+poInfo.qtyEnTransit+'u');
      if (poInfo.prochainelivraison) {
        lines.push('  Prochaine livraison estimée : '+poInfo.prochainelivraison.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}));
      }
    }
    poInfo.alertesFournisseur.forEach(function(al){ lines.push('  '+al); });
  }

  return lines.join('\n');
}

// Construit le contexte global du compte pour le system prompt
function buildClientContext(c) {
  const curYear = new Date().getFullYear().toString();
  const prevYear = (parseInt(curYear) - 1).toString();
  const prev2Year = (parseInt(curYear) - 2).toString();
  const lines = [];

  const ca2 = c.annualData?.[prev2Year]?.ventes?.totalCA;
  const ca1 = c.annualData?.[prevYear]?.ventes?.totalCA;
  const caYTD = c.ytdData?.ventes?.totalCA;
  const gv1 = c.annualData?.[prevYear]?.trafic?.totalGV;
  const gvYTD = c.ytdData?.trafic?.totalGV;

  if (ca2 || ca1 || caYTD) {
    lines.push('\n📅 CONTEXTE COMPTE (données historiques):');
    if (ca2) lines.push(`- CA ${prev2Year}: ${fmtEur(ca2)}`);
    if (ca1) {
      const d = ca2 ? ` (${ca2>0?(((ca1-ca2)/ca2*100)>=0?'+':'')+((ca1-ca2)/ca2*100).toFixed(1)+'% vs '+prev2Year:'N/A'})` : '';
      lines.push(`- CA ${prevYear}: ${fmtEur(ca1)}${d}`);
    }
    if (caYTD) {
      const ytdEnd = c.ytdData?.ventes?.periodEnd || "aujourd'hui";
      const d = ca1 && c.ytdData?.ventes?.periodStart && c.ytdData?.ventes?.periodEnd ? (() => {
        const [ds,ms,ys] = (c.ytdData.ventes.periodStart).split('/').map(Number);
        const [de,me,ye] = (c.ytdData.ventes.periodEnd).split('/').map(Number);
        const days = Math.round((new Date(ye,me-1,de)-new Date(ys,ms-1,ds))/86400000);
        const prorata = ca1 * days/365;
        return prorata > 0 ? ` (${((caYTD-prorata)/prorata*100)>=0?'+':''}${((caYTD-prorata)/prorata*100).toFixed(1)}% vs même période ${prevYear})` : '';
      })() : '';
      lines.push(`- CA YTD ${curYear} (01/01→${ytdEnd}): ${fmtEur(caYTD)}${d}`);
    }
    if (gv1) lines.push(`- GV ${prevYear}: ${fmt(gv1)}`);
    if (gvYTD) lines.push(`- GV YTD ${curYear}: ${fmt(gvYTD)}`);

    // Top catégories en croissance/déclin depuis les données annuelles
    if (ca1 && c.annualData?.[prevYear]?.ventes?.asins && c.asins?.length) {
      const annAsins = c.annualData[prevYear].ventes.asins;
      const currentAsins = c.asins.filter(a => (a.revenue||0) > 0);
      const totalCur = currentAsins.reduce((s,a) => s+(a.revenue||0), 0);
      // Comparer les marques
      const brandGrowth = {};
      currentAsins.forEach(a => {
        if (!a.brand) return;
        const annVal = annAsins[a.asin] ? parseNum(annAsins[a.asin].revenue) : 0;
        if (!brandGrowth[a.brand]) brandGrowth[a.brand] = { cur: 0, prev: 0 };
        brandGrowth[a.brand].cur += a.revenue || 0;
        brandGrowth[a.brand].prev += annVal;
      });
      const topBrands = Object.entries(brandGrowth)
        .filter(([,v]) => v.cur > 500 && v.prev > 0)
        .map(([b,v]) => ({ brand: b, pct: (v.cur-v.prev)/v.prev*100 }))
        .sort((a,b) => Math.abs(b.pct)-Math.abs(a.pct))
        .slice(0, 4);
      if (topBrands.length) {
        lines.push(`- Dynamique marques vs ${prevYear}: ` + topBrands.map(b => `${b.brand} ${b.pct>=0?'+':''}${b.pct.toFixed(0)}%`).join(', '));
      }
    }
  }

  return lines.join('\n');
}

function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function shortName(a) {
  if (!a.title) return a.asin;
  let t = a.title;
  if (a.brand && t.toUpperCase().startsWith(a.brand.toUpperCase())) t = t.slice(a.brand.length).replace(/^[\s\-–—:]+/, '');
  const dash = t.indexOf(' - ');
  if (dash > 10 && dash < 50) t = t.slice(0, dash);
  return t.slice(0, 45) + (t.length > 45 ? '…' : '');
}

function getMainKeyword(a) {
  if (!a.title) return a.brand || '';
  let t = a.title.split(' - ')[0].split(',')[0];
  if (a.brand && t.toUpperCase().startsWith(a.brand.toUpperCase())) t = t.slice(a.brand.length).trim();
  return t.split(' ').slice(0, 5).join(' ');
}

  // Injecter la section SEO séparément pour éviter les conflits de guillemets dans innerHTML

}
function renderWeeklyReview() {

  const asins = getFilteredAsins(c);

  // Delta CA : comparer uniquement les ASINs Fabrication (sourcingOnly exclus) pour éviter
  // un faux delta lors de l'activation initiale de la fusion Approvisionnement
  const caFabOnly = asins.filter(a=>!a.sourcingOnly).reduce((s,a)=>s+(a.revenue||0),0);
  const prevH = c.history?.weekly?.slice(-2)?.[0];

  const declining = asins.filter(a => (a.revenue || 0) > 0 && parseNum(a.revenueDelta) < -10);

  const growing = asins.filter(a => (a.revenue || 0) > 50 && parseNum(a.revenueDelta) > 20);

  if (!c.weeklyActions?.length) { c.weeklyActions = generateWeeklyActions(c); save(); }

  const weeklyImport = c.imports?.filter(i=>i.type==='ventes'&&(i.periodType==='weekly'||!i.periodType)).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  const weeklyPeriodStr = weeklyImport ? weeklyImport.periodStart + ' → ' + weeklyImport.periodEnd : null;

          ${away ? `<span style="font-size:11px;background:rgba(59,130,246,0.25);color:#93C5FD;padding:2px 10px;border-radius:20px">🏖️ Congés jusqu'au ${awayLabel}</span>` : ''}

      </select></div>`;
  }
  h += `<div style="display:flex;align-items:center;gap:6px"><span class="filter-label">Segment</span>

    </select></div>`;
  if (filters.market !== 'all' || filters.brand !== 'all' || filters.segment !== 'all') {
    h += `<button class="btn btn-sm" onclick="resetFilters()">✕ Reset</button>`;
  }

  const asins = getFilteredAsins(c);

  const totalUnits = asins.reduce((s, a) => s + (a.units || 0), 0);
  const totalGV = asins.reduce((s, a) => s + (a.glanceViews || 0), 0);
  const totalStock = asins.reduce((s, a) => s + (a.sellableUnits || 0), 0);
  const lowStockN = asins.filter(a => a.sellableUnits > 0 && a.sellableUnits < 50 && (a.revenue||0) > 50).length;
  const declineN = asins.filter(a => (a.revenue||0) > 0 && parseNum(a.revenueDelta) < -10).length;

  // Période des données courantes

  h += `<div class="kpi"><div class="kpi-lb">Unités</div><div class="kpi-v">${fmt(totalUnits)}</div>${dashPeriodTag}</div>`;
  h += `<div class="kpi"><div class="kpi-lb">Glance Views</div><div class="kpi-v">${fmt(totalGV)}</div>${dashPeriodTag}</div>`;

  h += `<div class="kpi"><div class="kpi-lb">Stock</div><div class="kpi-v">${fmt(totalStock)}u</div>${dashPeriodTag}</div>`;
  h += `<div class="kpi${declineN>0?' al':''}"><div class="kpi-lb">CA en baisse</div><div class="kpi-v">${declineN}</div>${dashPeriodTag}</div>`;

  h += `<div class="charts-grid">

  const searchActive = asinSearch && asinSearch.trim();

  </div>`;
  // Période courante détectée
  const latestImport = c.imports?.filter(i=>i.periodType==='weekly'||!i.periodType).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  const periodInfo = latestImport ? `${latestImport.periodStart||''} → ${latestImport.periodEnd||''}` : null;

  h += `<div class="tbl-wrap"><table class="tbl"><thead><tr>
    <th style="width:44px">Score</th>

  asins.sort((a,b) => (b.revenue||0)-(a.revenue||0)).slice(0, 50).forEach(a => {
    const health = calcHealth(a);
    const hCls = healthClass(health);
    const seg = calcSegment(a, totalCA);
    const isLow = a.sellableUnits > 0 && a.sellableUnits < 50;
    const isDec = (a.revenue||0) > 0 && parseNum(a.revenueDelta) < -10;
    const rc = isDec ? 'al-row' : isLow ? 'warn-row' : '';
    h += `<tr class="${rc}">
      <td><div class="hs hs-sm ${hCls}">${health}</div></td>
      <td style="max-width:220px">
        <div style="font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${esc(a.title)}">${esc(shortName(a))}</div>

      <td>${segBadge(seg)}</td>
      <td class="r" style="font-weight:600">${fmtEur(a.revenue||0)}</td>
      <td class="r">${deltaBadge(a.revenueDelta)}</td>
      <td>
        <div style="display:flex;align-items:center;gap:5px">
          ${(() => { const t = calcTrend(a); return sparkline(t?.series, t?.cls) + trendBadge(t); })()}
        </div>
      </td>
      <td class="r">${fmt(a.glanceViews||0)}</td>
      <td class="r">${a.sellableUnits ? fmt(a.sellableUnits)+'u' : '—'}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-xs" onclick="analyzeAsin('${esc(a.asin)}')" title="Analyser">📊</button>
        <button class="btn btn-xs btn-amazon" onclick="openAmazonProduct('${esc(a.asin)}','${a.market||'.fr'}')" title="Amazon">🔗</button>
      </td>
    </tr>`;
  });
  h += `</tbody></table></div>`;
  if (asins.length > 50) h += `<p style="font-size:10px;color:var(--tx3);margin-top:6px">50 premiers sur ${asins.length}</p>`;
  h += `</div>`;
  return h;
}

function copyText(text) {
  navigator.clipboard.writeText(text).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  });
  // Feedback visuel sur le bouton cliqué
  const btn = event.target;
  const orig = btn.textContent;
  btn.textContent = '✓ Copié !';
  btn.style.background = 'var(--g-bg)';
  btn.style.color = 'var(--g)';
  setTimeout(() => { btn.textContent = orig; btn.style.background=''; btn.style.color=''; }, 1800);
}
function renderAsins() {
  const c = cl();

      { id:'seg-b',     icon:'🥈', label:'Segment B',  count: countB,        color:'b'  },

    // ── Bandeau contextuel selon la vue ─────────────────────────
    const viewMeta = {
