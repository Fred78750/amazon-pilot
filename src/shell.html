<!-- Tooltip JS global -->
<div id="ap-tooltip"></div>
<script>
(function() {
  var tt = document.getElementById('ap-tooltip');
  var cur = null;
  document.addEventListener('mouseover', function(e) {
    var el = e.target.closest('.ap-tip');
    if (!el) return;
    cur = el;
    var tip = el.getAttribute('data-tip') || '';
    tt.textContent = tip;
    tt.classList.add('vis');
    posTooltip(e);
  });
  document.addEventListener('mousemove', function(e) {
    if (!cur) return;
    posTooltip(e);
  });
  document.addEventListener('mouseout', function(e) {
    var el = e.target.closest('.ap-tip');
    if (el) { cur = null; tt.classList.remove('vis'); }
  });
  function posTooltip(e) {
    var x = e.clientX + 12;
    var y = e.clientY - 8;
    var w = tt.offsetWidth || 240;
    var h = tt.offsetHeight || 80;
    if (x + w > window.innerWidth - 8) x = e.clientX - w - 12;
    if (y + h > window.innerHeight - 8) y = e.clientY - h - 8;
    tt.style.left = x + 'px';
    tt.style.top  = y + 'px';
  }
})();
</script>
